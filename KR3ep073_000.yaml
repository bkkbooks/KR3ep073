body:
  text: 喘潘精氣不藏喘息不寧上下本自相關勿睚而視之更變生不測慎之熟地淡菜巴杏坎氣麥冬川貝湯因痰而喘其病在肺宜以利痰為主淡菜蘇子川貝茯苓蛤殼杏仁橘紅瓦楞子貓兒眼葉大棗丸曹咳嗽氣喘胸滿不得臥門人楊立方診枇杷葉蘇梗汁旋覆花鯽魚膽蟬衣浮石蛤殼加紋銀一塊松另給方水邪未行姑進豬苓湯黨參豬苓蛤殼滑石麥冬茯苓澤瀉浮石顏歲氣急咳嗆淡菜巴杏橘紅麥冬燕窩屑轉方原方加天花粉燈心末孫歲氣易上逆姑進白沙方生蛤殼白浮石蟬蛻鯽魚膽銀蔣歲咳其則嘔姑服白沙必效方生蛤殼一兩白浮石一錢鯽魚膽一小匙蟬蛻四分枇杷葉轉方嗆在藥上之毛與藥無涉淡菜川貝巴杏三味為末梨膏和入藕粉搗丸陳歲清晨痰咯不利黨參焦術炙草橘紅半夏杏仁浮石轉方痰隨氣易上逆生白朮桂木代赭石半夏牡蠣澤瀉杏仁淡菜浮石茯苓又上之吐痰滑則下之出也艱使其出也易則上之所吐頗不利二者此難則彼易制方極費心思蛤殼浮石蟬衣蜂蜜杏仁雄豬肚黃病之起由乎氣血相搏非不能食也亦非火衰不運食也病因乎氣則易動而氣升以順氣為主氣與血不相離則益陰制火又宜先前方服貞元飲之得效以此也仍宜以此立法熟地淡菜鬱金橘紅茯苓當歸炙草沉香汁半夏蛤殼加夜合花不寐閔脈沉靜而不宣暢故至夜宜靜而反動內經謂陽蹻盛不得入於陰故不寐當體此意以行之或中病機龍骨琥珀石菖蒲遠志炭半夏棗仁茯神辰砂一塊絳紗包懸胎煮秫米先用甘瀾水煎某兩眉之間心之部也心火動則眉間氣結故不得寐心為肝子木火相應耳鳴隨之道相及也宜滋陰之方首烏生地石決川斛棗仁茯神黃甘菊炭丹皮炭潘歲言之發也根乎腎不若聲之出也由乎肺內經之論協氣其理甚明當於此處微參之熟地四錢懷山藥炒二錢茯苓一錢五分麥冬一錢五分益智炒三分萸肉炒二錢丹皮炒一錢五分澤瀉一錢五分五味一分蚪衣三分鹽水拌細辛三分復診夜不能寐心神尚未交六味丸紫菀蟬衣服一劑後去萸肉加棗仁失血陳歲痰中見紅咽中微干細生地杜仲生筋龜版麥冬梨肉種石斛續斷鹿筋當歸木瓜蛤殼金毛狗脊枇杷葉石楠葉轉方右關欠圓潤故飲食尚少無升騰氣象黃鱔砂仁穀芽冬蟲夏草神麯陳皮花生檀香泥又細生地杜仲當歸木瓜茜草藕粉黃鱔牛筋續斷仙鶴草又血止而咳未已生地龜版杜仲當歸黃鱔梨肉北沙參麥冬續斷地骨皮牛筋巴杏鴨血炙桑枝枇杷葉蔣失血後雖不至數而乾咳無痰火升不得臥脈象虛數皆屬氣火不下潛真陰失守之所致姑服大補陰丸炒熟地龜版黃柏知母北沙參麥冬王燥火為患生地龜版知母黃柏天冬麥冬牛膝汪吐血頗多卻從陽明來今即於補中帶截法為妙黃耆炙草白芍洋參藕節黃精犀角南棗白綿紙灰轉方仍用前法加入補陰之品生地黃耆藕汁白芍側柏葉犀角東洋角麥冬白綿紙灰又仍以前方增損犀角東洋角藕汁側柏葉茅根生地橘紅麥冬白芍黃歲失血後腰痛熟地天冬豬膚桑皮地骨皮潼沙苑龜版麥冬沙參杜仲續斷轉方原方去桑皮地骨皮加蓮鬚鰁膠花粉藕粉和丸葉歲咳嗽身熱門人楊立方診枇杷葉桑葉川貝杏仁橘紅赤苓青蒿天花粉松批治肺不用重劑最合治風溫之旨但寒熱之轉甚俱在下午以後慮其陽入陰分益留戀而不解故改用升提以防之方中去青蒿花粉橘紅加葛根桔梗程歲失血後咳嗆脈象虛數慮其火炎擾肺生地豬膚麥冬沙參桑皮地骨皮復診證已減矣可以進補熟地黃柏豬膚沙參龜版知母人中白又火猶上炎未已熟地天冬豬膚生長生果龜版麥冬蛤蜊又喉乾咳嗆熟地歸身炙草半曲橘紅茯苓豬膚麥冬趙太倉飲邪常發偶帶血出飲症多溫藥此以陰虛論辛溫忌進熟地淡菜浮石麥冬川貝蛤蜊殼丁血隨氣上湧其勢甚猛滋鎮大劑姑進以卻其鋭熟地龜版黃柏知母牡蠣棋子鉛轉方原方去熟地棋子鉛加北沙參女貞子趙血症常發宜於益陰中用堵截法熟地龜版麥冬沙參側柏葉牡蠣藕節炭沈瘧後咳嗆未止並見血阿膠料豆皮枇杷葉桑皮巴杏沙參轉方色夭不澤精氣頗虧宜實下焦鰻鯉丸加熟地側柏人中白龜版膠沙參淡菜鰁膠蓮鬚貓頭鷹湘蓮粉豬脊髓為丸沈歲嘉興血猶未淨清晨仍於痰中帶血生地麥冬料豆皮側柏葉藕節炭石斛施歲瀏河勞傷失血生地料豆皮黃耆黃明膠藕節參三七汁葉歲咳尚未止而夢泄頗甚四月內頻發二次恐其下屢泄而上亦不能攝也須固攝以斷泄為急務桑白皮地骨皮鰁膠蓮鬚豬脊髓山藥芡實金櫻子鱉甲青蒿白綿紙灰復診原方加龜版徐歲蕩口血之至也必胸中痛或喉中痛熱亦微總為陰虛所致龜脊甲青蒿子蛤蜊連肉白花百合鱉甲豬膚沙參白綿紙灰丸方氣分不足患處在右右主氣氣為陽陽微則營氣亦為之不充當從中州調理使穀氣充滿元陽得以復振真陰得以奮復黃耆坎氣熟地鹿角膠黃精杜仲當歸杞子棗仁羊腰子炙草潼苑菟餅五味羊尾龜版膠紫衣核桃葉右關脈弦搏肝木乘旺氣擾胃脘痛微見紅所由來也心中悸動夜間多汗陰虛陽浮治宜滋填固攝生地石決明棗仁沙參藕節阿膠淮小麥麥冬茯苓白綿紙灰林歲失血後咳而喘熟地淡菜坎氣沙參麥冬牛膝胡桃肉復診原方加棋子鉛豬膚張歲湖州嗆多則血見每在清晨病在肺也而下根於腎熟地淡菜沙參川石斛陳皮川貝轉方淡菜沙參料豆皮川貝側柏豬膚麥冬熟地女貞子陳皮藕汁龜版煎膏為丸李歲咳嗆不止豬膚玉竹杏仁桑白紫菀橘紅丁歲診脈短而數經云長則氣治短則氣病數則煩心據經而論氣不足而營分熱虛者益之熱者清之兩得其平斯可以治病玉竹麥冬甘蔗汁川貝料豆皮十大功勞馬歲海寧胃脘痛後大失血色紫微帶黑色吐後痛漸減則向之所云痛者瘀者為患也徒補難效於補中寓通為妥東洋參於術歸身棗仁遠志炭韭汁制軍黃耆炙草木香茯神桂元肉搗丸馬歲海寧前患血證後右耳生一小毒潰而不斂此處為少陽經所行水不足火有餘少陽為遊部動而不靜故久而不愈也治當壯陰以制虛陽徐收其效為宜生地黃菊淡菜元參川貝夏枯草丹皮料豆皮阿膠青蒿汁桑葉銀花野菊花葉汁牡蠣鱉甲黑芝麻藕汁阿膠煬化加白花百合搗丸高歲不華於色營分已虛奈何迅掃一切以重傷津液也我為培其陰以乞靈於天一生氣熟地懷山藥茯苓淡菜麥冬白芍丹皮澤瀉燕窩吳歲多痰善噫淡菜蘇子巴杏蛤殼川貝枇杷葉藕汁轉方清晨咳嗽痰多淡菜川貝巴杏燕窩青鹽半夏橘紅蛤殼枇杷葉又咳從吐紅來不可專治肺現患脾泄穀芽橘紅杏仁神麯苡米茯苓木瓜又痰多氣逆不順枇杷葉海浮石金柑皮川貝母巴杏仁藕汁又頭中微脹多痰石決蔞霜浮石蛤殼川斛川貝橘紅又原方加甘菊炭桑葉丹皮又胸中微痛或因肝氣之升血亦因之用清潤法細生地側柏葉橘子筋料豆皮藕汁巴杏又益氣化痰淡菜川貝藕汁柿霜北沙參燕窩又原方加桐城秋石又丸方石決明蔞霜浮石川貝巴杏甘菊丹皮淡菜蛤粉橘紅桑葉花粉柿霜燕窩煮丸周失血之後卻不咳嗽上傳之患此時無庸慮及但脈象見數而右關微搏恐火邪侵犯中州又不可不急為之防也議進滋養方熟地茅根鱉甲龜甲沙參扁豆料豆皮十大功勞高氣血平補人參石決明杜仲蓮鬚藕麥冬石斛湘蓮懷山藥趙歲遇雨著寒又復吐血咳嗽因於寒也落花生青鹽陳皮青鹽半夏大茴香洋蟲冬蟲夏草大麥冬沈歲咳嗽痰中見紅日晡寒熱膏方十大功勞葉一斤紅棗半斤加豬膚六兩刮淨去油煎之再撇油徐入十大功勞紅棗同煎膏顏歲感燥火而失血宜潤肺以滋化源生地阿膠藕節側柏麥冬北沙參如交節氣加白綿紙灰十張蒯歲鼻血不已甚至於吐少陰陽明俱有責焉用大補陰法熟地知母犀角女貞子人中白龜版黃柏黑山梔藕節藕粉煮漿和丸淡鹽湯送下復診心火上乘肺故痛阿膠雞子黃淡芩白芍淮麥川連吳痰中仍帶血出蛤殼浮石蟬殼蔞霜藕汁川貝柿餅炭白綿紙灰咳張歲咳嗆未緩黃耆北沙參川貝巴杏麥冬扁豆浮石豬膚姚歲素體陰虧更兼暑熱侵肺咳嗆痛癢無處不病治法不易桑白皮鮮地骨皮北沙參淮山藥蓮心燕窩豬膚復診原方加制黑芝麻三錢北五味一錢益智二錢同黑芝麻一兩炒好須揀去五味益智周歲口中津液乾枯當於液中求之豬膚一兩柿霜一錢龜版膠一錢燕窩一錢沈歲飲食如常而脈象少生動之氣雖咳嗽未久亦當為未雨綢繆之計枇杷葉淡菜料豆皮巴杏川貝桑白皮玉竹轉丸方脈神未旺者以精氣未充故也淡菜川貝鰁膠連須龜膠豆皮黃鱔懷山藥湘蓮茯苓菟餅玉竹麥冬落花生為末龜膠煬化和入豬脊髓四兩拌入和丸陳歲清晨痰咯不利六君去茯苓加浮石杏仁淡菜張脈數而寸尤甚口乾燥便溏泄手足太陰皆病先宜調和二臟豬膚十大功勞蓮肉扁豆麥冬天冬北沙參懷山藥芡實糯稻根鬚歐陽歲揚州痰之起伏根乎火之升降治法即從此推詳淡菜四錢漂生蛤殼五錢打小塊茯苓三錢塊海浮石一錢橘紅一錢杞子炭二錢韭根三錢紫石英五錢沉香汁三分磨汁元武頭三錢炙又加豬尾骨一兩秋石青蒿根三錢煎湯去油淨咽乾羊咽中干痛以意治之蛤殼一兩花粉一錢五分竹捲心七葉三味煎湯去渣取湯泡旗槍茶葉一撮橄欖三個搗爛蓮心七個如茶飲朱歲咽痛腹痛是上下交徵治法因不易川貝人中白煨栗子生蘄艾水飛青黛柿霜楂炭茯苓復診丸方豬臍肉四兩洗蘄艾三錢臍帶一條漂煨栗子三兩小茴香三錢炒均煮爛焙乾磨末炒楂炭二兩炒菟餅一兩炒黑防風二錢真藕粉和丸又丸方天花粉一兩柿餅炭二兩蛤粉五錢濂珠三錢研青黛五錢研人中白七錢漂淡仍用藕粉漿泛丸廉歲咳由陰傷且吐涎沫頗多咽中乾燥勢所必然耳豬膚一兩刮淨去油入山藥一兩煎湯聽用燕窩一錢五分煎爛收膏後入豬膚汁再收人中白七錢秋石三錢用少許和入豬膚燕窩膏內代鹽服陰虧汪證入三陰有寒無熱肌肉瞤動仿救逆法桂枝石決茯神南棗炙草小麥薑盛真陰素虧故所見之證多在三陰熟地淡菜棗仁辰砂拌麥冬石決川斛茯神北小麥又丸方料豆皮淡菜茯神石決明熟地天冬棗仁龜版阿膠煬化和丸外用人中白濂珠青黛燈心辰砂加嘉定花粉和蜜水泛為丸韓下易矢氣不納也宜益腎而歸於肺丸方熟地菟餅鹿角膠杞炭遠志懷山藥補骨脂萸肉杜仲五味棗仁紫衣胡桃麥粉漿丸顧先天不足恐成虛損丸方熟地鹿腦虎脛骨菟餅萸肉河車鹿茸杞子炭杜仲懷山藥牛骨髓羊骨髓豬脊髓張肝腎之陰不足滋填固攝是議熟地杞子牡蠣棗仁五味菟絲天冬柏仁又丸方從煎方中加入霞天膠麥冬阿膠山藥漿丸某大小便不禁主腎氣不攝納填補下焦為急務熟地鹿角霜補骨脂北五味益智仁坎氣菟絲杜仲桑螵蛸徐攝腎氣入下焦坎氣浮石桑螵蛸荷葉蒂黃繭子益智蛤殼復診從中下同治熟地海浮石桑螵蛸荷葉蒂蠶蛾坎氣生蛤殼霞天膠範元陽元陰久已弗充滋補使之漸長炒熟地杞子炭羊脊髓當歸青鹽陳皮麥冬杜仲蓯蓉巴戟鹿角霜沈太倉腰痛在夜子後是由督陽不升其治在腎熟地鹿角膠菟絲子杜仲核桃鹿角霜補骨脂柏子仁羊腰子徐脈小弱陽浮易動從督脈上升心中震蕩驚惕不寧治以填鎮固攝熟地牡蠣龍齒棗仁紫石英淮麥龜版石決飛金柏仁辰砂茯神鹽水炒黃柏程先天稟賦不足右腰脅頗痛左脊骨忽高起大有損象急宜治之熟地杜仲菟絲川斛河車茯苓羊左背脊骨某元氣弱不振心動神移宜大補氣血熟地杞子辰砂茯苓菟絲龜版柏子仁人參杜仲棗仁淮麥沙苑南棗龍骨牡蠣紫石英飛金箔中暑陸暑熱侵肺心中頗熱竹捲心蘆根連翹花粉藕汁北沙參加菩提珠根轉方下體午後熱肝氣亦為之動鮮荷梗新絳藕汁蘇梗汁絲瓜絡木通路路通又用瀉白法桑皮地骨皮燕窩川貝白蜜枇杷葉瘧袁三瘧未止用三甲煎首烏龜背甲於術橘紅茯苓鱉甲穿山甲青皮半夏顧歲寒熱連綿已及一載門人蔣星墀診冬朮豆卷茯苓炙草桂木橘餅薑棗松批所用極中要害但立方尚未能入虎穴而得虎子故增數味以探之原方去炙草加地龍鹿角霜穿山甲秦歲間日瘧至渴飲是暑瘧荷葉邊連翹桔梗白通草竹捲心蔞根枳殼朱瘧久但熱不寒此謂疸瘧用檳鱉散治之檳榔汁烏梅生麥芽鱉甲橘核茯苓塊轉方鱉甲牡蠣香櫞青皮汁當歸首烏麥芽濕比於陰瘧入於陰其髮間日其為氣深其道遠比於陰者比産於水不能引而上之出於高表焉能制此伏邪發於機先者乎故尊方雖極深研未能洞中竅會者此也姑擬一方以察病機之所向青蒿一錢大豆卷二錢茯苓二錢地龍一錢炙釜下土三錢鮮荷梗三錢豬苓一錢蟬衣三分蠶蛾一個蜜蜂二個桑螵蛸殼一錢此亦搜絡之法繆歲寒熱一日數發因虛而致當歸炙草穀芽苡米大麥仁黃鱔砂仁陳皮李脈小而數但熱不寒汗多渴飲與竹葉石膏湯加桂枝竹葉生石膏麥冬知母半夏炙草桂枝韓病在少陽陽明大豆卷麥芽杏仁川貝神麯枇杷葉葛根通草周歲寒熱後下身皆浮腫便溏溲數生於術豬苓赤苓桂枝澤瀉大腹絨四大人蘇織造瘧久不止又復下痢偶食即如廁是邪既下陷又復穀氣下流肝腎非輕證也宜大劑升陽固攝人參五錢製附子七分炙甘草五分肉果一錢煨補骨脂一錢炒鹿茸一錢五分炮薑炭七分炒於術三錢木香一錢赤石脂一兩煎湯代水復診諸證已稍減煎方去赤石脂加釜蓋木一兩生穀芽一兩煎湯代水一劑大減痢徐久痢不痊理中丸白朮炮薑黨參砂仁炙草木香二神丸原方和勻服朱痢已二十日晚服清靈丸暑濕之邪亦已蕩滌宜扶脾胃正氣勿使下陷為穩焦術炒丹皮厚朴蘄艾葉茯苓炒芍炙草楂炭煨木香高歲痢經二載裡急後重門人顧祖庚診白朮廣皮白芍炙草秦皮荷葉楂炭紅曲松另給方黃鱔紅曲尤歲未便腹痛既便腹痛則無往而非痛矣推原其故全在營氣之傷當應脾陰中求之砂仁白芍扁豆雞內金大麥粉漿丸楂炭炙草紅曲黃鱔蔣歲身熱泄瀉肛門脹痛濕歸下焦葛根茯苓神麯蟬殼桔梗豆卷苡米荷梗劉歲大便溏薄小便黃赤而短午後發口渴咳嗽伏暑為病據述只有此子聞之凜然大豆卷荷梗枳殼菩提珠根竹捲心桔梗通草金痢痛甚下墜色微白柴胡四分生白朮一錢五分白芍一錢五分薤白三錢另煎衝入枳實一錢炒厚朴一錢五分炙草三分轉方痢頻數微見紅裡急後重生白朮一錢五分厚朴一錢五分荷蒂二個木香汁三分磨沖升麻七分楂炭三錢赤苓三錢服二劑痢大減今歲上半年燥金司天燥與熱同氣下半年少陰在泉令火酷甚雖濕少熱多究屬土運熱氣未能暢達經曰火鬱發之不發恐其已陷而愈下愈深也治此證以寒熱濕中為主時醫一見此證以白頭翁湯為套方不問屬何經絡殊為背謬者哉桐縣下痢一晝夜一百餘次不能食柴胡四分羌活三分川芎四分枳殼一錢加生穀芽一兩前胡三分獨活三分桔梗四分厚朴一錢復診柴胡三分生白朮一錢白芍一錢黃芩八分炒山楂一錢枳實一錢厚朴一錢五分炙草三分秦皮一錢炒又煨葛根一錢生白朮一錢五分白芍一錢木香三分磨蘄艾炭五分升麻五分厚朴一錢炙草三分楂炭三錢荷蒂二個釜蓋木五錢茯苓三錢生穀芽五錢又肛門熱舌尖微紅原方加炒黃芩八分又舌紅甚暑邪由內外達用葛根黃連黃芩湯加味照前方再加炒黃連三分黃芩減一分不用釜蓋木又舌尖漸淡舌微干傷陰也白芍一錢五分炙草五分阿膠一錢蛤粉炒丹皮一錢黃蠟五錢荷蒂二個加藕節炭三錢又熟地三錢白芍一錢五分炒炙草五分山藥三錢阿膠一錢五分蛤粉炒黃蠟三錢烏梅一個穀芽三錢荷蒂三個泡湯煎藥張女余至時門人周蘊石在坐出所治張方以下痢不止手足厥逆用附子理中合茱萸大棗白芍服後神氣略定痢稍緩余謂此方極中病機可仍服之俟明日再議孰知服後病忽增重下痢日夜不止面赤戴陽神昏譫語諸惡畢集余制此方與之服後痢乃止辰粥四盂神氣寧靜脈亦循經大是奇事人參五分桂枝木六分炙草四分青花龍骨四錢附子四分泡制於術一錢炮薑炭六分左牡蠣七分加大棗二枚赤石脂五錢糯米三錢絹包硃砂一塊五六錢重紅絹包懸胎煮煎湯代水録張女病原方案下痢不止面赤戴陽神昏譫語循衣摸床撮空理線左脈中部短促而急恐其下痢亡陰神魂飛越岌岌乎有難返之勢矣今議進救逆法加參附術以收拾飛越之虛陽以桃花湯固攝下焦攔截去路急存耗散之陰精少厥同治斷鰲正極在此一戰以冀挽回於萬一此亦不得已之極思耳風熱徐歲肺氣膹郁即是致病之由發時耳目俱作癢又合之大便之堅燥已曉然矣石決明杷葉桑葉大蚌殼豬肺連管入石膏煮朱歲牙齦血出又鼻衄抵暮熱而無汗麻黃杏仁石膏生草半夏橘紅桂枝吳寒熱已微似病漸愈但據證則指頭寒脈微欲絶神氣倦怠仲聖所謂少陰病也危機已兆恐地水火風猝來莫御將若之何姑擬一方淡附子三錢蔥白三寸乾薑二分紫石英八錢茯神三錢淮麥三錢熟地四錢麥冬二錢泡湯煎藥俟湯泡轉黃即用煎成藥汁再衝入熱童便大半酒杯豬膽汁一小匙轉方服藥後兩手已溫脈微已現陰分轉陽屬吉兆但胃腑未通津液未復邪熱劫陰正賴調理危然後安談何容易今姑擬益陰通腑方川鬱金三分生香附汁四分沉香汁三分枳實汁四分玫瑰花露磨熟地四兩麥冬二錢泡湯和入四磨汁內飲之顏歲寒去而熱未去究竟溫邪猶存滋藥與邪相比黏而難脫姑緩之使肺得清化之權何如枇杷葉三錢生蛤殼五錢杏仁一錢去皮尖白浮石一錢冬桑葉一錢蟬蛻四分川貝一錢五分加紋銀一塊鄭洞庭內有鬱熱在絡留鼻之左邊交額中觸外風則內風亦動故在外凜凜惡風而皮膚以內卻熱也病機冗雜治法不易生地三錢炒黃柏七分防風七分淡芩七分玉竹一錢五分龜版三錢刮白鹽水炒知母一錢黃耆一錢五分桑葉一錢淡菜三錢漂鮮地骨皮二錢黃甘菊炭一錢去蒂炒丹皮八分生左牡蠣三錢夏枯草花一錢五分張鼻塞有涕天氣晴和則愈紫菀麥冬蟬蛻花粉細辛羊腦和丸木乘土孫歲食入脘脹嘔惡大半夏湯加味半夏黨參白蜜吳萸薑汁附子徐歲胸悶嘔吐噯氣棗仁石決明砂仁殼益智仁茯神龍齒生香附紅豆蔻宋歲痛在中脘中脘乃陰陽交界濁氣不降門人蔣星墀診冬朮茯苓炙草陳皮吳萸丁香楂肉香附砂仁松批此仲聖進退黃連之所作也夏腹硬不痛其痛在脘食谷則痛黃鱔炒鬆雞內金楂炭蒼耳子香櫞砂仁紅曲茯苓王肝脈滯而澀是肝氣鬱鬱則風不宣暢焉能發鳴當借金以開之蛤殼蟬衣上半截鯽魚膽桔梗枇杷葉浮石轉方金不發聲再為之鼓動其氣麥冬蟬蛻荷蒂桔梗坎氣熟地計肝邪因飲挾氣上逆必助金以制之蛤殼鯽魚膽浮石蟬衣紋銀枇杷葉復診原方加牡蠣蔞霜去蛤殼又再從肝胃治旋覆花代赭石半夏茯苓枇杷葉蔞霜又川貝母地骨皮蔞霜杏仁桑白皮茯苓枇杷葉又熟地茯苓半夏紫石英當歸炙草橘紅沉香汁又食噎不下再思一法治之旋覆花一錢雞谷袋一個泥塗煨白蜜三錢代赭石三錢蟾蜍喉管一個泥塗煨蜜蜂三個趙素有胃寒今食不能下用建中法桂枝炙草公丁香當歸南棗煨薑智仁紅曲橘餅皮轉方胸中未開半夏冬蟲夏草烏藥汁落花生橘紅大茴香沉香汁鍋巴嚴天道左升而右降人身一小天地亦左升而右降故肝之位在左其氣常行於右今營分大傷絡脈不營是以動作而皆痛治先調營為主鮮荷梗旋覆花南花粉新絳絲瓜絡藕蓮子肉茯苓繆食入未能運化焦術菟餅陳皮香櫞大棗砂仁楊肝木犯胃神麯枳實砂仁鉤鉤陳皮雞內金木香木瓜沈歲氣阻食不下則噎而嘔從肝胃不調治旋覆花半夏陳香櫞沉香汁代赭石茯苓橘紅轉方加熟地茅山蒼朮米泔水浸刮淨皮飯上蒸張脅脹之甚則嘔不納穀胃受肝收戕不更衣者七八日肝邪不得泄寒邪礙胃辛燥不受治法最難人參五分柏子仁二錢蘇梗汁三分人乳磨松子仁二錢加紋銀新絳一錢五分楂肉二錢橘子絡七分橘紅五分轉方大便既行腑氣已通不食仍如故而昨夜安眠達旦脹滿漸平較前為安適原方去松柏仁加鮮稻頭四錢荷葉梗三四寸顧午前食飯不噎午後食粥反噎是午前以陽動而得運午後陰漸盛而得合象也立方宜從此著想冬蟲夏草一錢炒香雞腸一條白蜜三錢牛酥三錢沉香汁三分磨沖石磨鐵心燒紅投藥中蔣歲右腹仍痛且脹當歸杞炭吳萸桂枝小茴香白芍細辛橘核木通韭根鬚童歲進食不能安穀是噎膈之象據述嘔痰廢食初不知膈深之如是也古來成方用之絶不見效姑以意為之白蜜三錢蜜蜂二個研桑蟲二條研戌腹糧二錢漂洗雞谷袋一錢研泥塗炙劉歲身腹俱痛兼之嘔惡生益智一錢新會一錢厚朴一錢藿香五分半夏一錢五分薑一錢陶食後即噫意欲大便中弱不升東洋參豆蔻淡蓯蓉菟餅砂仁大麥粉漿丸錢溫中之劑最合病情東洋參炮薑半夏益智仁於術炙草茯苓白蜜丸方熟地炙草菟餅於術肉桂鹿角膠當歸杞子杜仲蓯蓉羊內腎青鹽為淨末羊內腎同鹿角膠搗丸郝歲診脈小弱時吐蛔風入胃七日而生蟲脾胃得溫則伏氣塞則上出而嘔用藥以辛酸為主苦味為輔殺蟲之品又次之於術淡薑烏梅淡附子金鈴子甘草蜀漆白芍當歸加使君熟末調入左肝腎之陽俱不足故食後鮮運議進雙補方丸方制於術黃牛肉粉萸肉肉果補骨脂車前子菟餅巴戟肉懷山藥砂仁廣木香五味子廣皮麥粉和丸肝風楊風陽鼓動以靜鎮之丸方熟地石決明木瓜料豆皮茯神紫石英阿膠左牡蠣甘菊血餘棗仁炒麥冬將阿膠煬化和入藕粉煮漿為丸程風陽鼓動右手足筋脈抽引治宜養營熄風熟地黃黃甘菊牛筋木瓜歸身桑枝石決明杞子炭鹿筋杜仲首烏某筋脈抽掣風陽鼓動熟地牡蠣杜仲黃菊遠志鹿筋鴨血桑枝首烏石決明杞炭丹皮辰砂茯神半夏申歲所謂麻木眩暈者全是肝虛之症即胸悶一節亦屬正虛邪擾刮痧從肺稍泄與正無裨恐其因開泄而驟致氣升厥不可為其所惑石決明鬱金細生地龍齒淮麥橘紅川石斛辰茯神阿膠川貝黃菊鉤鉤蔣氣似浮故脈不得沉而降氣亦隨之制首烏鹿頭骨黃甘菊黃耆白芍藥炒防風益智仁炙草石決明沉香汁王兩足筋脈時攻痛攻之甚頭且暈炒熟地阿膠鴨血炙桑枝黃甘菊川石斛石決明鴨血炙豬蹄筋杜仲木瓜復診加生左牡蠣龜版張病發神昏宜用鎮靜之方生地石決龍齒川斛沉香汁牡蠣淮麥茯神柏子仁祝崇明據述平素以筋脈牽引為舒暢惟輕則適肝之性曲直喜條達也過重則抽掣太甚下之海底必微濕濕少則稍安多則周身不適如有物為之遮蔽又若摳進必口中大氣為之一噓方為之廓然此風陽之鼓動燥火升騰也其在經曰神在天為風在地為木在體為筋在臟為肝在變動為握握搐搦也火盛水衰風隨火動所謂火空則發也海底之濕肝火之盛子盜母氣也昨小便失溺不禁厥逆隨至危機已著今搐搦不已苟非大劑滋培鎮攝暴脫可虞今據理立方以審察病機之所向炒枯熟地七錢生左牡蠣一兩六錢麥冬三錢川石斛三錢沉香汁三分加紋銀二兩炒黑棗仁三錢大條人參一錢五分九孔石決明一兩北五味七分辰茯神三錢復診神氣漸安即從前方損益原方加天冬一錢五分阿膠一錢研調濂珠末五分又心中如雲霧遮蔽全是氣火挾痰加風米飲湯又用遠志柏仁霜水飛辰砂豬心血丸服一錢五分煎藥送下福大人左右兩關洪而有力右關屬胃胃火有餘則上侵肺部左關屬肝肝火有餘則上注心中丹溪氣有餘便是火則益陰清火是治心火之大法方用金匱麥冬湯加減熟地三錢麥冬二錢黑棗仁二錢茯神二錢黑殼建蓮二錢五分南花粉一錢五分炙草三分倪歲風消之證竹捲心淮麥蘆根炙草南棗牡蠣程肝虛火易上升為患石決石斛茯神鮮蓮子麥冬杜仲北沙參淮山藥豬脊髓復診脈象帶數咳甚則肺氣阻抑便溏則胃陽不宣土金俱病宜以神農上品之藥治之方與中宮有裨黃鱔懷山藥砂仁燕窩大麥仁鍋巴玉竹丸方炒黃鱔懷山藥建蓮肉苡米仁芡實扁豆茯苓白芍穀芽砂仁為淨末燕窩三兩煮爛和入豬膚膏六兩和丸每服四錢王歲胸痞心嘈淮麥南棗炙草龍骨沉香汁茯神棗仁翁瘰癧是肝膽火上炎為患淡菜元參牡蠣川貝四味為末夏枯草煎湯成膏為丸顧風陽鼓動脈顯其形丸方熟地龍骨黃明膠河車茯神鰁膠首烏辰砂棗仁牡蠣石決菟餅杜仲羊腰子羊尾周歲耳聽稍窒於用以耳鳴為之蔽也據證或因乎外邪但以鳴而斷在陽浮而動不能不責之於陰虧治以滋填為主熟地石決明黃甘菊丹皮磁石牛膝復診眩暈內熱熟地料豆皮牡蠣石決菊花鉤鉤棗仁辰砂茯苓王歲肝腎之氣升則不得臥兩足無力下焦宜填宜固熟地棗仁龍齒柏仁麥冬牛筋鰁膠茯神嚴診脈肝火有餘腎水不足以致反並於陽明而益旺右關之火所由來也治宜壯陰和陽熟地天冬鰁膠山藥霞天膠橘紅生地麥冬淡菜蓮心為淨末用鱉一個煎膠去渣代蜜和丸丁女火易浮動非上升即下降疼痛不已最難治療燕窩淡菜川貝黃明膠蝸牛人中白濂珠土貝刺蝟皮龜版天花粉煮漿和丸孫歲真陽易於上升即從陽引之亦不能降桂七味等劑姑置之熟地茯神棗仁澤瀉萸肉懷山藥龍齒牡蠣丹皮琥珀藕粉和丸瘕俞瘕據其右以誤服柴胡致動肝邪衝突為患以柔制剛使漸即平和為穩淡菜蛤殼牡蠣地栗海蛇楂炭範歲腹中有瘕經來攻痛大便溏泄白朮菟絲大茴小茴葫蘆巴韭根鬚鄒歲風塊未消右肋時痛旋覆花新絳杷葉荊芥青蔥香附當歸邱歲臍旁結瘕連及少腹門人朱應階診熟地歸身炙草杞子炭紫石英沉香汁橘核楂炭松批極類臟結以此方借治頗合機宜高胸痞且脹用小陷胸法栝蔞仁枳實半夏川連杏仁孫物有不可化者有化則俱化者歷治勿效可化乎不可化乎當從其難化處參之蒼朮一錢米泔浸枸杞子二錢紫石英七錢沉香汁三分熟地三錢三味同炒地栗三個海虴五錢顧嘔逆有瘕上攻肝病也嘔時喜冷飲口中乾眩暈因風挾火上行肝火之變動處此以前之所無當歸一錢五分龍骨三錢打碎吳茱萸三分泡淡金鈴子肉一錢五分炒白芍一錢五分炒桂枝七分細辛三分小茴香一錢炒黑杞炭三錢沉香四分磨沖烏藥一錢肉桂三分去皮木通一錢吳歲調和肝胃治白朮香櫞皮青皮廣皮地栗雞內金瓦楞子半曲砂仁穀芽臌李腎陽衰微水聚成脹真武湯主之天真丹亦主之生於術茯苓淡附子白芍乾薑晨服天真丹二錢嚴腹中微膨生白朮砂仁厚朴木香神麯木瓜茯苓苡米仁楊腹脹不減柴胡枳實白芍炙草薤白煎送小溫中丸二錢張歲督陽不升肝絡不通以致氣阻漸脹治當以崇本為主濟生腎氣丸全料加入毛鹿角二兩炒小茴香一兩僧單腹脹有瘕作痛脈小無力禹餘糧丸每服一錢五分談歲門人顧祖瘐診旋覆花阿膠滑石通草冬瓜子枇杷葉豬苓茯苓杏仁大腹皮松批加之力太重氣並於下上遂不足矣宜從降中寓納用宋時本草方蛤殼豬苓茯苓澤瀉朱歲海門為脹為硬全是虛氣所為今姑用一方探之熟地當歸炙草杞炭砂仁杜仲菟絲餅沉香汁僧氣虛皮膚易於暴腫用養營法調之熟地黃耆黨參白朮炙草陳皮當歸白芍顧歲腹腫足冷氣衝咳嗽濟生腎氣丸濕徐天柱德清榜眼真陽衰弱不能運行周身濕阻經絡氣分凝滯頭至腰背側及兩肩皆陽氣流行之地一有所阻為痿弱為痹痛諸病百出矣治斯證固在溫補而溫燥太過又慮其化熱濕熱甚則風生燥濕氣之流弊不至此不止宜以建中助陽補心為主帥驅濕通絡為裨將清熱熄風為遊騎合而行之步伐整齊方可奏功矣生於術四兩曬首烏四兩蒸曬丹參一兩豬心血拌炒黑蒼朮二兩米泔水浸刮去皮毛蒸柏仁霜五錢黑芝麻四兩蒸當歸二兩炒益智仁一兩鹽水炒沉香五錢不經火毛鹿角二兩去毛酥炙棗仁二兩炒遠志五錢龍骨一兩煅研菟絲子二兩補骨脂二兩炮炒桑螵蛸二兩炙蛤蚧一兩去目足酥炙白蒺藜一兩去刺炒杜仲三兩潼沙苑二兩炒萆薢一兩曬五加皮一兩五錢仙靈脾一兩五錢羊脂炙白麻骨一兩石南葉一兩五錢炙黃甘菊二兩去蒂金毛狗脊一兩五錢去毛炙桑葉二兩曬荷葉二兩茯苓二兩曬蓮鬚二兩焙為淨末羊肉外腎煮爛加炒黑大小茴香二兩搗丸唐寒濕為災遊行痹病郁久化風三氣成痛以宣通為主桑葉萆薢海桐皮白麻骨料豆皮芝麻木瓜茯神木川通草苡米仁楊病因濕熱侵入陰分用仲聖治溫邪入少陰法宣通氣機阿膠澤瀉茯苓豬苓牡蠣蛤殼匡寒熱起自舊年十一月足脛浮腫濕熱凝滯不化大豆卷白朮萆薢桐皮木瓜茯神獨活地龍菩提珠根俞飲邪盤踞姑進紅豆丸紅豆蔻母丁香胡椒砂仁四味和丸大棗一個去核納入丸藥一粒飯上蒸細嚼方歲據述溲少足浮腫則下焦濕聚不泄顯然舌色微白轉絳恐蘊蒸化熱莫若從下焦宣泄以察病機桂木於術大腹絨豬苓茯苓澤瀉白麻骨復診原方加茅鹿角菟絲子田歲舌絳而光又甚薄小便黃赤慮其陰之涸也又生瘡是濕邪之外達熟地豆卷當歸炙草鱉甲鹿角霜潘歲咳每遇寒熱而發背部畏冷口膩苔濁門人蔣星墀診桂枝茯苓細辛生薑冬朮炙草陳皮大棗松批濕將化熱陶病之初傷於瓜果脾胃之陽為寒所郁而治法以陰柔之品進郁者愈郁而不得宣暢以為和平以致食少而胃困腹痛而痹窒中焦之陽益憊矣治宜以芳香辛通之品破其所阻使脾陽得運胃氣升騰病自愈矣於術炙草益智煨薑桂枝南棗加鍋巴復診辛甘二味與臟氣不合甘味尤甚姑去之於術菟餅砂仁陳皮鹿角霜當歸計寒濕為災上乘脾土於術菟絲大茴補骨脂附子茯苓鹿角霜雄雞小腸李歲腰痛便泄門人顧祖瘐診鹿角霜益智茯神炙草杜仲於術龍骨遠志細辛菟絲松批用細辛通徹上下方極靈活薛濕化痰將成大病熟地陳香櫞茯苓黑芝麻地龍蒼朮半夏桑葉澤瀉謝囊腫足浮溲少脈沉洋參於術茯苓炙草陳皮半夏禹餘糧丸每日一錢五分陳濕阻絡脈為麻木氣血不行痿痹所作與宣通法生於術一錢當歸一錢五分杞炭三錢鹿筋四錢杜仲三錢東洋參一錢黃耆一錢五分仙靈三錢附子七分山甲二分虎脛骨三錢石楠葉二錢白蒺藜一錢五分桂枝七分加鴨血炙桑枝五錢宣木瓜一錢煎湯代水煎去渣研調麝香一釐徐歲咳嗽舌根黃門人謝士安診枇杷葉桑白皮杏仁桔梗川貝白通草松批雖云心腎不交實則濕阻中焦故也陳歲兩足行動未能輕便於術當歸鹿筋仙靈脾附子杜仲金毛狗脊東洋參杞子牛筋虎脛骨萆薢石楠葉馬閘肉蓯蓉巴戟鴨血炙桑枝劉歲洞庭據證右半身時麻木診脈兩手俱弦滑是濕邪之留著處麻木之所由來也但治濕不可過燥燥則傷陰非所以利濕也仿黑地黃丸治法熟地當歸續斷半夏橘紅鴨血炙絲瓜絡蒼朮黑芝麻山藥藤桑瀝李脈來弦滑手足麻木萆薢薏米當歸木瓜赤苓通草劉洞庭右脈之滑較甚於左酒濕動之也熟地蒼朮二味同炒存性杞炭紫石英當歸淡菜川貝白解藥桑瀝半夏鴨血炙絲瓜絡復診陽氣易動多升當用介類以潛陽熟地三錢蒼朮一錢二味同炒黑存性龜版三錢石決明七錢生牡蠣四錢大蚌殼五錢杞子炭三錢當歸一錢五分川貝五錢五分黑芝麻三錢白蒺藜一錢五分磁石三錢鴨血炙絲瓜絡三錢桑瀝半杯周歲兩手脈伏而不揚氣機之滯也宜助中宣達人參炙草當歸升麻於術茯苓橘紅柴胡復前日偶傷於風昨已愈矣須從肝脾調治人參茯神遠志歸身砂仁於術棗仁炙草木香桂元王海州真陽素虛濕邪易干食後停積遂至不化下焦水不通行雖不至脹腫滿有諸治宜溫補宣通痹著方生於術生菟絲茯苓萆薢杞子肉桂毛鹿角淡附子小茴補骨脂麻骨木瓜五加皮獨活細辛薏米仁復診海濱多寒熱之不熱是無火也生於術二錢生菟絲三錢製半夏一錢五分補骨脂一錢泡炒肉桂三分去皮毛鹿角一錢五分去毛淡附子五分茯苓二錢萆薢一錢鹿筋三錢漂獨活四分北細辛一分虎脛骨二錢炙石楠葉一錢巴戟一錢五分木瓜一錢五加皮一錢五分蘄艾炭一錢杞炭二錢宋痛在右肋轉而之左又從左擾中間有時作水聲者此必飲邪為患姑立一法試之熟地三錢蒼朮一錢蒸二味米泔水浸同炒存性淡菜四錢川貝一錢五分俞歲腸風發時都在秋分前後此以天氣下降陽隨之而下陷也治以升陽為主黨參二錢炒黑鹿角霜二錢醋炒附子七分炒黑川芎五分黃耆二錢炙甘草五分炒黑防風根六分大豆卷二錢炒又丸方黨參二兩切片焙炙草五錢醋炒黑附子七錢炒川芎五錢黃耆二兩炙炒鹿角霜二兩炒防風根六錢大豆卷二兩炒為淨末蒸餅和丸每服四錢開水送下王峻補精血即是筋骨強健之本藥酒方熟地杞子牛膝木瓜虎脛骨千年健牛筋當歸蓯蓉附子五加皮山藥藤鹿筋桂圓杜仲甘菊冬桑葉羊尾骨續斷木香豨蘞檀香沉香白蔻仁白蒺藜用火酒三斤浸七日入蜜半斤陳酒十七斤吳於補中寓祛濕和血之法豬脊髓一兩鮑魚四錢洗地龍一條炙腸風陳歲腸風頭痛手足時冷門人顧祖庚診生地石決明白芍黃耆阿膠女貞料豆皮黃甘菊炙草西洋參旱蓮鴨血藕粉煮漿和丸松批加桑寄生一味用黃耆煎湯炙再用鴨血拌炙存性則靈動矣顏大便堅澀營血不足桑葉杏仁白蜜黑芝麻牛酥橘紅徐歲腸風下血糞肛門氣墜作痛門人吳紹葵診熟地白芍牡蠣阿膠炙草烏梅木瓜荊芥炭松另給方補中益氣湯加蝸牛鱉頭白芍又給丸方熟地山藥茯苓鰁膏大鱉頭一個殺之勿去血煎爛白芍丹皮澤瀉炒鴨血夏枯草花六兩煎膏去渣代蜜丸徐毒發在大腿肛門之間瘍科謂之臟毒歷久勿痊姑用輕補重託之法以冀其收功亦甚難事也紫花地丁曬刺蝟皮生地當歸穿山甲靨忍冬花焙黃明膠料豆皮黃耆象皮蝸牛仙鶴草黃明膠煬化為丸疝錢診脈小弱素有肝氣疝證時發宜從下焦治熟地沙苑菟餅柏子仁楂核羊腰子杜仲杞子小茴橘核金鈴子淮山藥方海州莖中攣交子後亦舉真陽不充治宜溫中下二焦熟地補骨脂於術菟餅砂仁茴香鹿角霜巴戟肉轉方所謂攣在莖中者已緩胸中尚不開爽炒熟地補骨脂胡蘆巴巴戟肉杞子炭小茴香菟絲餅公丁香沈歲疝症少腹疼腎子偏大厥陰受寒白扁豆大腹皮荔枝核茯苓小茴香橘核木香木瓜濁蔣精氣不固熟地蓮鬚金櫻子肉杜仲湘蓮鰁膠又丸方熟地金櫻子建蓮蓮鬚沙苑鰁膏芡實菟絲豬脊髓和丸李咳未止濁證亦未愈熟地蓮鬚白螺螄殼枇杷葉桑螵蛸鰁膠蛤殼麥冬巴杏吳濁證發而瘀不利澀應通用進導赤法生地白荷花露生草梢赤苓料豆皮竹心蓮子心小木通白茯苓復診熟地蓮鬚赤白茯苓菟絲子鰁膠草梢小木通黑殼建蓮又昨夜寒熱大而汗泄邪已達矣再為之固下以攝陰鰁膠菟絲巴杏蓮鬚川貝茯苓木通又氣不攝精鹿角霜鰁膠蓮鬚赤白茯苓黃耆菟絲川貝麥冬又仍用前方增損鹿角霜鰁膠菟絲子北沙參蓮鬚黃耆桑螵蛸赤白茯苓麥冬又原方加砂仁半夏曲繆精氣滑泄小便時淋閉精竅尿竅俱失常度治宜通塞並用熟地蓮鬚茯苓金櫻子白荷花露鰁膠豬苓澤瀉生芡實此方加入懷山藥建蓮鹿角霜豬脊髓蒸熟搗丸又煎方東洋參阿膠豬苓茯苓柴胡滑石澤瀉麥冬朱濁證未痊熟地鴨肝藕汁麥冬玉竹淮山藥料豆皮湘蓮許歲濁證起於正月涓涓不絶腎關開而精氣大耗筋脈無以濡養矣填補固攝勢不容緩矣現在咳嗽雖屬風邪但診右寸大而不斂非木火旺令所宜不可視為小恙而忽諸熟地金櫻子白蓮鬚菟絲子白荷花露鰁膠芡實潼沙苑湘蓮袁歲無錫濁淋已二載有餘面黑是腎虧之象兼之內熱亦理之所宜固下一法是所要圖熟地鰁膠金櫻子蓮鬚黃柏龜版復診熟地龜版牛筋金櫻子龍骨芡實東洋參黃柏杜仲鰁膠牡蠣倪歲濁症未解生地牡蠣川連杞子麥冬五味豬脊髓桑螵蛸轉方加北沙參張降精之後繼之以血通澀兩難宜從精血兩調為穩鰁膠三錢炒烏賊二錢炙豬脊筋一兩鹽水制益智三分勿研藕汁半杯復診濁之降也不自知已非腎藏志之本體矣當使之知以證腎氣之上交炒鰁膠海螵蛸荷蒂藕汁豬脊髓桑螵蛸益智又丸方炒黑鰁膠四兩蛤粉炒海螵蛸一兩五錢炒荷蒂一兩茯苓五錢炙桑螵蛸一兩益智仁三錢炒遠志炭五錢白蓮鬚一兩炒豬脊髓為丸蔣濕熱流注下焦濁症屢發通塞並用方生地炒鰁膠豬脊髓鹽水炒黃柏木通螺螄殼荷花露蓮肉吳面色不華營分不足丸方熟地杞子河車天冬金櫻子霞天膠淡菜菟餅鰁膠麥冬白蓮鬚沙苑牡蠣龍骨鹿筋牛筋杜仲芡實為淨末豬脊髓四兩蒸搗丸周歲素嗜酒濕熱下注致濁症生地木通川斛茯苓豬苓澤瀉草梢淡竹葉某脈小而急月事先期色紫黑營熱證也熟地六兩水制炒附烏雞丸丹皮二兩炒真阿膠三兩蛤粉炒當歸三兩去頭尾炒細生地四兩炒人中白一兩二錢料豆皮四兩焙白芍三兩炒杜仲四兩生曬湘蓮四兩去心焙白薇一兩焙女貞實四兩去粗皮蒸九次為淨末用烏骨雄難一隻縛殺之干捋毛去腸留肝先用鱉甲八兩青蒿子六兩鮮地骨皮六兩旱蓮草四兩煎濃湯煮雞加入童便二碗牛乳二碗醋一碗俟雞爛取起與藥末同搗焙燥磨末骨亦磨末另炙拌入取原雞汁加入白花益母草膏丸服每服三四錢開水送下彭左關頗澀是肝血不足之象熟地豬脊髓白蓮鬚豬腰子鰁膠龍骨潼沙苑荷葉奇經趙經阻不行肚腹連腰頗痛從奇脈治熟地杞炭沙苑丹皮香附楂炭當歸杜仲白薇丹參麥芽桑椹白花益母草煎膏丸某氣不宣通為脹厥陰為陰之盡得中見之化鬱而暴升或縱或橫變態百出極難治也姑擬數味候鮑周兩君同商鮮荷梗中段透出水面四錢川芎五分兩味雨水先煎香附七分磨沖生白芍一錢五分金鈴子肉一錢橘核三錢炒芍鈴橘三味用井水煎遲下轉方下焦虛證已著但有難名之疾總因厥陰之症為風為火最善變也方不可執立方俱從左關之弦處參悟其狀少腹兩邊脹痛陰戶中掣抽疼一劑愈金鈴子肉一錢橘核一錢五分炒杜仲二錢五分豬腰子一隻先煎去油川芎五分香附一錢五分杞子三錢藕汁浸搗沖大半杯俟藥煎好合淨與藥汁同煎一沸青蒿根汁一錢浸木瓜搗爛取汁小半杯衝入又肝病之痛未已而適逢經至色淡而少斯知痛加甚之故營氣虛也當有以培之燥熱非傷陰不可也服藥後痛緩漸聚入臍下少腹矣熟地四錢丹皮一錢五分炒茯苓一錢塊生白芍二錢萸肉二錢澤瀉一錢五分懷山藥二錢炒當歸二錢炒杞子二錢藕汁浸搗炒橘餅酒半酒杯橘餅一兩投入煎沖又昨日之方原欲其散走絡而痛之勢分今則專走大絡而氣且上衝勢且為合矣當迎其合處治之但體既虛絡無血以養當用法以充之為妥熟地八錢炙草五分杞子汁半杯藕汁浸搗沖當歸二錢炒紫石英一兩血餘炭一錢二分研細加入杞子汁內又昨日氣聚上衝不惟衝脈之逆而由兩肋而升肝亦覺沖為患矣所喜者其勢聚而不散從其聚處擊之而使之並竟歸入臍中而刺痛不休矣其故總因血虛而不能滋養肝沖當臍即肝沖聚會之處也精血空乏宜撫不宜剿使其日積月盛府庫充盈無乘虛竊發之患矣臍中痛一劑愈熟地一兩炙草五分辰砂茯神三錢杞子汁藕汁浸搗沖當歸一錢炒棗仁三錢紫石英一兩豬膚肉一塊用坎氣一條木瓜八分煎湯瓦上炙乾先去油淨吳奇經河津空乏以致厥陰經脈不司約束發為陰挺治宜養陰清熱漸復其故凡一切消克等味宜戒勿進生地四錢鹽水炒黃柏一錢白薇一錢刮白龜腹版三錢鹽水炒知母一錢丹皮炭一錢五分淡菜三錢漂漂鮑魚三錢鹽水煮石決七錢轉方從原方加入蝸牛二個白螺絲殼二錢夏枯草花二錢丸方生地四兩浸搗黃柏一兩鹽水炒黑生牡蠣一兩淡菜三兩切片焙龜腹版二兩刮白生研知母一兩鹽水炒黑生蛤粉一兩鮑魚二兩切片焙土貝一兩五錢去心丹皮一兩五錢炒蝸牛七錢生研白螺螄殼一兩五錢地栗一兩五錢夏枯草花一兩五錢焙鱉頭一兩煅為淨末藕粉煮漿丸每服四錢方歲平湖病在産後既患陰挺又復患痔總屬氣血太虛所致熟地四錢鹽水炒黃柏一錢鱉頭一個桑葉三錢龜版三錢炙鹽水炒知母一錢蝸牛二個芝麻一錢人乳一酒杯衝入俞歲太倉咳嗽氣逆周身浮腫小便不利門人吳紹揆診桑葉蘇子紫菀杏仁茯苓陳皮桔梗萊蔔子松批浮腫而喘無汗此風水象也麻黃桂枝杏仁甘草白朮服二劑而竟愈轉方白朮炙草乾薑半夏五味子桂枝茯苓杏仁細辛溫平望産後氣血已虛亟為補救猶恐不及乃以毒藥攻克譬猶賊寇跳梁劫掠一空急圖恢復談何容易此時傷之最重者尤在衝任次及於肝蓋衝任在人身為十二經之海猶制府也肝猶郡縣也議先從此著力以觀其應否大便堅澀不爽一則腎司二便一則大腸津枯一則肺不能通調水道強使之下其可得乎生白芍三錢人乳一酒杯生左牡蠣七錢海虴一兩炙草八分阿膠二錢溶入轉方泄瀉未已瘕亦未消原方去海虴加淡菜三錢楂肉三錢懷山藥一兩孫諱樹本四川新絳縣奶奶丸方發之生根乎血其脫也因乎風癢起白屑即風之動發則火熾火熾則血燥故發脫也治宜益陰兼清肝火以熄風熟地四兩炒血餘膏三兩料豆皮二兩焙牛酥三兩制首烏四兩料豆蒸曬生地二兩炒阿膠二兩丹皮二兩炒兔肝一具煮搗黃甘菊炭三兩桑葉二兩黑芝麻四兩熟石決明三兩鹽水煮天冬二兩焙烏飯子二兩焙女貞子四兩炒鴨血四兩湘蓮二兩去心焙杜仲二兩焙夏枯草花二兩焙用旱蓮草汁拌曬加生牡蠣二兩為淨末烏飯子十斤南棗四兩煎膏和入阿膠牛酥為丸附三餘紀效中風華風陽上旋眩暈鼻塞口乾言謇防其類中生地石決鉤藤麥冬遠志炭穭豆皮石斛菊花茯神雪羹湯代水楊歲四肢麻痹脈象軟弱總由營虧血不養筋恐屬類中根萌殊可慮也至於脘中痛則疏肝理胃為先蒺藜木瓜茯苓鬱金汁鱔血炒桑枝香附橘紅歸身薏仁沈歲脾不攝涎老年恐有類中之慮與六君子加味宜緩圖之六君子加上耆五味益智仁諸歲麻木不仁眩暈脈弦風陽上旋防其類中熟地蒺藜牛膝橘紅沉香汁石決天麻茯神柏仁鴨血炒桑枝陳歲眩暈手足不仁防其類中首烏虎脛骨歸身茯苓桑枝石決牛膝杞子杜仲朱歲掉眩麻木防其類中生地石決川斛牛膝天麻首烏白芍鉤鉤沉香張肝腎陰虧風動上旋左目失明不得寐汗易泄下部乏力防其類中炒生地茯神柏仁石決淮麥制洋參棗仁麥冬川斛南棗畢歲膽虛中正無權疑懼交至脈弦為減風陽易動防其類中熟地石決茯神遠志阿膠雞子黃棗仁柏仁陳歲風痹痛已經五載類中門求之熟地五加皮木瓜萆薢山藥藤當歸虎骨薑黃牛膝桑枝張歲肢痿振掉腰脊痠楚痱風難治熟地蓯蓉牛膝川斛桑枝杜仲巴戟虎骨廣皮郭悸動健忘汗易泄手振少寐症由煩勞過度心血漸衰類中可慮宜防患於未萌黨參黃耆當歸麥冬紫石英棗仁茯神柏仁五味淮麥南棗另服天王補心丹華歲體豐肝鬱脾濕生痰阻絡機竅不利不飢少納語言謇澀此屬痱中之根霞天曲茯神生香附黑山梔竹茹菖蒲遠志膽星橘紅又脈左弦右滑痰火生風故左額脹痛仍以和陽熄風化痰去濕石決天麻半夏茯苓竹瀝鉤鈞黃菊柏仁益智薑汁湯歲痱風不易復原小便餘瀝固攝奚疑熟地川斛茯苓遠志巴戟麥門冬萸肉蓯蓉菟絲子五味杜仲桑寄生朱歲驟然咽痛舌本強苔黃頭搖手振由陰虧肝風挾痰上凌清竅中厥根萌先以鹹苦和陰再商治本羚羊角元參茯神橘紅鉤鉤鮮生地石決川斛竺黃雪羹湯煎朱壯盛年歲舌本強言謇眩暈素多痰濁阻絡太陰厥陰主治異功散加半夏天麻竹瀝石決遠志肉薑汁又言謇舌強久矣漸至腰楚足痠左股無力轉側不舒脈形小弱右微數此肝脾腎三陰並虧日萌痱中之機當究其本為要人參生地遠志杜仲蓯蓉干天冬麥冬菖蒲巴戟竹瀝薑汁楊歲痿躄四月有餘脈濡小澀語言不利痱風之象腹痛大便或溏或結姑從中治宗內經獨取陽明之義上耆茯苓牛膝陳皮砂仁桑枝白朮木瓜虎骨當歸白芍又痿躄不減脈仍微細前議三陰虧損痱中最難取效熟地蓯蓉當歸木瓜牛膝砂仁虎骨巴戟杞子陳皮桑枝陳痱風有年秋分節風陽復動面色赤而目左顧汗易泄舌色絳時形搐搦振掉總屬水虧木失滋涵變端有不可測者幸脾胃尚佳冀其資生之藥餌草木非所恃也擬方商正人參麥冬五味棗仁燕窩粥石決川斛茯神柏仁雪羹湯代水陳陡然寒慓齘齒逾時康復此亦痱風變幻考金匱云心中虛惡寒不足者與此適符仲景用侯氏黑散填塞空竅之法然用古而不必泥於古也當祖其意而通之人參牡蠣石決明棗仁五味茯神龍齒紫石英麥冬礬澄流水煎鄒歲手足麻木已經一載丹溪云麻屬虛木是痰類中可慮熟地當歸桂枝杜仲桑寄生虎骨杞子牛膝竹瀝薑汁李水虧於下陽浮於上舌本強言謇頭痛厥陽化風挾痰類中之象脘痞不舒兼理氣分熟地遠志石決牛膝膽星天麻蓯蓉菖蒲川斛鉤鉤竺黃沉香蔣歲偏枯在右下部無力須培血中之氣首烏黑芝麻歸身川斛牛筋黃耆石決明牛膝杜仲馮歲跌僕傷損尻髀股膝痛楚舌黃泄瀉由肝腎衰憊足三陰同病也痱風難治萆薢木瓜茯苓砂仁焦術虎骨澤瀉鱔血炒桑枝華歲偏枯在左宗丹溪養血以通經絡之痹熟地歸身杞子桂枝廣皮虎骨牛膝木瓜桑枝竹瀝薑汁朱歲咳血已止足痿乏力舌本漸硬此痱中根萌未能速功熟地茯苓寄生麥冬木瓜虎骨牛膝川斛扁豆還少丹何歲下虛上實眩暈耳鳴足軟乏力皆類中根萌近復肝絡失暢鬱勃宜慎蓯蓉石決杞子川金柏仁歸身川斛牛膝鉤鉤另服磁石六味丸四兩朱據述寒栗則厥厥後善哭針於脘中乃蘇此濁痰上凌心位心邪有餘故笑也古人都以龍雷定論即以石頑法治之附子另煎沖龍骨膽星鬱金川連遠志茯神硃砂拌川貝又昨進降濁陰通靈竅奠定神明等法心中仍惡寒不定再仿仲景侯氏黑散桂枝細辛防風龍骨當歸乾薑遠志甘菊牡蠣炙草肝風鄧歲昔賢云口眼常動故風生風搖則血液衰耗無以營筋故筋脈拘急有歪僻之象桂枝丹皮石決明桑葉當歸川斛甘菊黑芝麻華耳鼻常靜故風息口眼常動故風生昔賢論之詳矣驟然歪斜動則生變也考諸易象有足徵焉風行地上曰觀觀者目之義也上動而下靜山下有雷曰頤頤者口之義也下動而上靜見端若此治法可悟矣制首烏九孔石決川斛天麻甘菊料豆皮鉤鉤桑葉殷歲陰虛生內熱肝氣化風變幻細生地茯神歸身沉香汁石決明棗仁白芍鬱金榮歲陰虧肝鬱化風化火耳鳴舌乾起刺不得寐脅脹見象一斑脈弦沉滯帶數議體用兩顧細生地白芍茯神金鈴子石決明上沉香棗仁鬱金雪羹湯代水王云士夫人素來經漏損陰水不涵木化火化風頭痛偏左瘕聚瘰癧見象一斑入秋燥氣加臨咳痰氣臭嬌臟日虛薄暮音漸不揚心中有空洞若谷胃納不旺大便燥結皆液虧火燥所致前議西昌法極是吾意參以育陰和陽化痰息風不致肺痿為幸細生地麥冬橘紅石決明川貝北沙參阿膠茯苓蛤殼雪羹湯代煎朱脈弦不寐心中嘈雜總由肝陽亢逆化風內動議以靜藥和陽之治生地柏仁白芍川斛淮麥牡蠣茯神鉤鉤棗仁南棗朱交春節肝火未平膝腫麻木總由水虧不能涵養當以乙癸同治法生地茯苓黃菊丹皮川斛虎骨牛膝杞子石決陳皮錢神魂失守夢寐間心陽馳逐時或眩暈汗泄總由陰虧陽浮議與潛陽攝神方牡蠣石決朱茯神棗仁柏子仁川斛丹參龍齒料豆皮華素患肝風入春陽升體痛身熱非外感也議和陽熄風治之生地石決明鉤鉤茯苓木瓜川斛料豆皮丹皮棗仁山藥藤陳陰虧於下陽亢於上古人總以靜藥和陽益陰宗乙癸同源之治六味加石決白芍川斛青鹽周陰虛火升咽燥筋脈抽引眩暈悸動大便不爽總由水虧木火少藏遊行變幻莫制非易治也宜與滋養大生地石決知母雞子清苓塊龜膠川斛麥冬人中白蔣肝風鼓動口眼歪斜上耆麥冬當歸青蒿新會甘草茯神白芍骨皮功勞葉趙風陽鼓動口眼歪斜石決明蒺藜川斛歸身羚羊角鉤鉤天麻丹皮白芍另用黃耆五錢桂枝三錢陳酒煎濃汁以故布揩拭定處患側遲眩暈跌僕心悸蠕動筋脈抽掣肝風振蕩與養陰熄風生地茯神棗仁石決明淮麥阿膠柏仁川斛鉤鉤南棗畢肝風入絡作脹細生地絲瓜絡沉香汁首烏石決明阿膠木瓜料豆皮鉤鉤又脹在膚大便不爽與泄厥陰韭根鬚金鈴子楂炭醋青皮沉香兩頭尖延胡麥芽厚朴華肝氣鬱勃化風眩暈嘈雜䐜滿不寐宜養肝之體理肝之用細生地石決明茯神鬱金砂仁料豆皮川斛白芍香附華高年陰液向衰素患痔痛春夏之交風陽上冒陡發經脈抽脹幾至暈厥身熱面赤汗出淋漓逾時爽然若失脈弦數舌苔黃厚尖紫初用養陰熄風和絡平胃時作時止幾無措手矣用羚羊角夏枯草絲瓜絡鉤鉤濃煎雪羹湯沖服總未全瘳轉用方諸水衝入日進幾碗熱漸平而苔濁黃厚不退食粽又劇再與枳殼建曲麥芽橘白鬱金和胃寬中得大便又得小安脈漸和苔色減然仍寐不安筋仍掣黎明汗泄用黑棗仁四錢炒木瓜七分沖雪羹湯日進二三碗如是調理計及匝月諸恙始有愈機廉歲向衰年歲肝氣挾濕化風頭暈耳失其聰食後少運脈濡而弱際此濕土司令當扶中為法熄風佐之黨參霞天曲茯苓黃菊杞子於術炒白芍陳皮石決砂仁徐發則悸動巔脹意不樂而抑鬱不舒明是厥陽化風盤旋鼓蕩宜以靜藥和陽兼調氣機以暢其鬱石決茯神柏仁白蒺藜雞子黃拌炒沉香汁牡蠣香附生地料豆皮孫操勞鬱勃木乘土位為脹脈形窒滯大便不爽皆是咎徵川朴半夏大腹皮茯苓沉香汁枳實皮麥炒陳皮砂仁神麯雞內金小溫中丸二兩又脹勢稍松仍以疏肝之郁泄腑之滯生香附川朴青皮海金砂枳實神麯大腹皮赤苓雞內金沉香仍服小溫中丸又連進疏肝泄腑腹笥大寬下墜陰囊足跗浮腫惡寒行動則氣逆咳嗽再為暖下泄濁生於術苓皮杏仁川朴雞內金淡附子澤瀉椒目萆薢另服大針砂丸空心下楊風陽擾絡悸動氣逆頻厥胸脅痛且脹疏補兩難熄風緩肝是議白蒺藜柏仁新絳白芍沉香汁石決明川金牡蠣淮麥南棗馬噎氣不舒肢麻高歌化風欲厥陳膽星沉香汁鉤鉤菖蒲元參石決明蘇梗鬱金橘紅廉此濕土司令當扶中為法熄風佐之黨參霞天曲茯苓黃菊杞子於術炒白芍陳皮石決砂仁唐頭風痛偏左兼咳寒熱與泄風和陽鉤鉤羚羊角夏枯草蔓荊子杏仁石決丹皮菊花桑葉袁營虧絡虛氣滯痛經瘕聚脘脅作脹風動振掉眩暈發厥皆見端也宜熄風和陽調奇經阿膠石決當歸四制香附茯神白芍柏仁烏賊骨鄒下虛上實過在足少陰厥陰熟地當歸茯苓龜版決明萸肉杞子川斛磁石菊花肝火糜耳鳴頭眩左為甚發作有時每值嗔怒則劇肝火有諸宗鹹苦治法消息病機生牡蠣夏枯草羚羊角細生地元參金石斛王曲直作酸肝膽之咎徵左金湯周頭風痛而耳聾咽痛肝陽升逆化火遊行症經五旬法宜滋降生地石決丹皮夏枯草黃菊羚羊角川斛赤芍元參眩暈諸眩暈鼻衄腰楚膝痠六味丸加杜仲牛膝豬腰尤肝鬱不舒化風作眩鉤鉤金斛石決新會茯苓丹皮赤芍香附過陰虧陽越鬱勃化風眩暈耳鳴繼以鼻淵宜清滋熄風細生地川鬱金汁石決黑梔丹皮夏枯草香附赤芍趙奇脈暗傷陽浮作眩熟地牡蠣石決白芍陳皮沙苑杜仲川斛茯苓砂仁柏陰精少奉陽光易亢眩暈口乾治宜滋養三才湯加麥冬川斛石決明胡厥陽眩暈跌僕下部漸腫腰楚帶下八脈暗損風陽鼓動使然石決鉤鉤生白芍茯苓澤瀉天麻黃菊鬱金牡蠣諸眩暈痰黏噁心宜熄風安胃方天麻橘紅茯苓竹茹鉤鉤半夏白芍藿梗秦肝鬱化風眩暈善悲不得寐宗長沙臟躁法熄風和陽主之甘麥大棗湯加石決明茯神川斛柏仁鬱金沉香汁尤風痰眩暈甚則嘔逆溫膽湯去甘草加酒芩天麻鉤鉤石決癲癇沈癲癇頻發從厥少治羚羊菖蒲丹皮鬱金汁石決遠志連翹桑葉又丹溪云癇厥根於龍雷潛陽介類為宜羚羊牡蠣連翹元參石菖蒲石決龜版丹皮遠志鬱金汁過痰火上蒙防其癇厥天王補心丹四兩白金丸二兩和勻開水下四錢曹風陽驟起時或瘲為厥恐成癇疾羚羊石決膽星茯神石菖蒲鉤鉤鬱金橘紅丹參朱疑懼健忘乏力膽虛中正之官失職仿天王補心丹生地麥冬棗仁丹參遠志南棗當歸麥冬柏仁茯神淮麥華風陽未熄巔頂痛仍不休脈弦為減長沙之旨也下虛上實素嗜酒舌苔滑膩挾濕生痰今厥暫止發亦甚易預防之道須推介類靜藥和陽佐以扶正利痰冀其應桴人參茯神熟地川斛遠志牡蠣龜版阿膠生白芍雪羹湯煎又前議滋填潛降治其本也考之古訓癲癇病發於陰情志內傷痰氣阻遏機竅鬱勃陽升此致病之由也診脈弦大而遲舌苔濁膩胃少納穀見象一斑上午稍得清朗下午善欠多寐頭風未熄復厥奈何擬方備商六君子加石決竺黃遠志鉤鉤一兩煎湯代水另服白金丸痰火朱痰火襲入心包神明矇昧或笑或哭病起有年不易調治膽星研調朱茯神棗仁豬心血拌炒石決明川連水炒遠志肉柏仁九節菖蒲馬風痰矇昧妄語欲厥竹瀝膽星半夏石決明丹參薑汁川連鬱金鉤鉤九節菖蒲另服竹瀝達痰丸二兩白金丸二兩橘紅湯下朱經云邪有餘則笑不休病經年餘兼從痰火門求之丹參膽星鬱金茯神橘紅元參川連山梔遠志竹茹細葉菖蒲天王補心丹四兩空心開水下四錢某嗔郁痰蒙多言或笑或哭經停五月宜化痰暢肝香附丹參鬱金川連當歸澤蘭膽星菖蒲遠志錢痰氣結於會厭蘇梗汁桔梗半夏麥冬橄欖汁元參橘紅杏仁雪羹湯代水畢煩勞陽升挾痰神蒙不寐寐易驚惕宜鎮肝攝神交合坎離洋參元參朱茯神川連石決生地麥冬遠志肉膽星棗仁豬心血炒菖蒲金箔程前議熄風化痰暈厥頻發發時微笑瘲目赤此心肝兩經之火挾痰瀰漫正氣漸虧恐變端叵測不可不預為之備參以扶正冀稍應桴人參膽星鬱金石決細葉菖蒲茯神竺黃橘紅鉤鉤雪羹湯代水顧經云神有餘則笑驚駭痰襲心包此致病之由也延久消瘦神呆少寐水火失交治從坎離洋參茯神膽星麥冬菖蒲生地遠志竺黃丹參棗仁豬心血拌炒天王補心丹白金丸又症象稍減然當壯盛年歲春夏之脈濡細形神消瘦殊為可慮仍前法參以扶正體用兩調人參朱茯神遠志炭膽星天竺黃生地棗仁豬心血炒丹參鬱金顧補劑頗適所兼脈象細弱難期驟復也人參茯神丹參石決明遠志生地棗仁龍齒竺黃淮小麥周前以滋養熄風利痰宣竅見效當補攝緩調冀其康復黨參黃耆棗仁歸身炭淮麥熟地茯神遠志石決明南棗又風痰因驚入絡屢經狂亂今當春升司令水不涵木眩暈脘悶議養陰熄風生地茯神遠志生洋參橘紅菖蒲石決川斛鬱金玫瑰露鉤鉤天王補心丹白金丸和勻另服劉體豐中虛濕勝生痰肝膽鬱勃化火挾痰交結神蒙狂亂或笑或哭中厥之漸未能速功洋參茯苓石決明川連膽星遠志棗仁豬心血炒琥珀丹參雪羹湯代水煎天王補心丹白金丸和勻服汗周自汗經久不愈胃納減少宗玉屏風加味玉屏風散加茯神棗仁牡蠣砂仁柏仁麥冬川斛顧勞倦乏力晨起自汗宗東垣法黃耆黨參茯苓地骨皮白朮麥冬甘草柏仁浮小麥湯內熱盜汗口不渴仿柏子仁丸柏仁冬朮茯神骨皮浮麥麥冬牡蠣川斛白芍杜汗稍斂多夢紛紜炒生地茯神龍骨柏仁五味生耆棗仁牡蠣杜仲紅棗朱煩勞則汗易泄陽升少寐無非心腎不交填陰潛陽一定章程炒枯熟地茯神棗仁牡蠣淮麥龜血版川斛遠志五味南棗孫腎失封藏陽加於陰謂之汗六味丸加牡蠣麥冬白芍杜仲川斛建蓮以上六味丸去丹皮澤瀉不寐華魄氣盛魂不歸肝不得寐瀉白散加淮麥紅棗朱脈軟弱不寐目澀責在營不足貞元飲加杞子茯神柏子仁黃菊遠志棗仁凌陽不交陰寤不成寐嘈雜悸動與育陰潛陽熟地阿膠遠志棗仁淮麥茯神紫石英雞子黃柏子仁南棗朱不寐滑泄心腎失交而不運口甜不渴脾虛挾濕之象大便或溏或結滋燥不宜偏勝仿妙香法兼以丸藥調之益智仁茯神山藥遠志湘蓮龍骨茯苓菟絲芡實木香又將交夏至一陰初萌最宜交合心腎固攝陰陽為要而脾失乾健滋膩緩投仍佐丸劑調之人參茯神菟絲龍骨黃柏鹽水炒益智遠志五味牡蠣木香朱肝腎下虛神魂失守悸動少寐多夢紛紜耳鳴嘈雜氣或升逆自肝而出也症自春升至此此水火失交恐多變幻熟地雞子清遠志肉沉香汁牡蠣龍齒阿膠茯神紫石英謝口甜不寐仿溫膽法半夏橘紅金石斛藿梗竹茹黑山梔蔞皮消渴胡歲善食而瘦經文謂之食㑊大便溏薄熱在胸膈汗多不解議從胃熱脾寒著想連理湯張歲消渴一年金水同治固本丸加五味石斛天精草計歲腎氣不攝易成下消生地菟絲桑螵蛸天冬杜仲萸肉五味補骨脂川斛湘蓮王腎水先虧心火內熾渴飲溲多有消渴之慮大生地五味茯神天精草天冬麥冬川斛山藥又渴稍止而大便艱澀滋養無疑生地五味白蜜川斛知母熟地麥冬天冬茯神天精草陳歲消渴幾及半載龍雷灼金陰液日涸最為重候姑擬王太僕法所謂壯水之主以制陽光八仙長壽丸加知母天精草陳今年火運少陽司天消渴一年形神漸瘦溲多膩濁此陰精少奉少虧陽亢亢則害也大便燥脈澀壯水之主保本之道也知柏八味丸加麥冬嘉定花粉肺痿馮口乾咳嗆脈虛數恐延為肺痿擬用清金寧肺麥冬炙草川貝玉竹北參桔梗雞子清枇杷葉朱經曰熱在上焦者因咳為肺痿已經一載咳必咽乾而痛是虛火灼金故音漸嘶矣大便溏薄宜滋不礙脾北參川貝扁豆秋石甘草麥冬桔梗山藥雞子清朱咳吐涎沫半載不愈肺痿之漸半夏茯苓甜杏浮石竹茹麥冬甘草橘紅款冬費咳隨熱勢損益甚於晝而差於夜金氣薄則畏陽光恐延肺痿仿喻西昌清燥救肺湯枇杷葉炙草杏仁霜茯苓桑葉麥冬石膏糖炒阿膠蔡歲熱久傷陰脈弦數本宜滋養但嗽甚則嘔胃氣受戕金失所養漸延肺痿議以培土生金法蜜半夏炙草北沙參蛤殼竹茹麥冬粳米茯苓橘紅十大功勞薛久咳涎沫胃少納脈短恐延肺痿與益胃生金西洋參扁豆川貝橘紅竹茹麥冬茯苓生蛤殼薏仁又肺金久虛暑邪易侵西黨參茯苓川貝扁豆枇杷葉麥冬北沙參地骨皮荷梗生蛤殼余歲咳痰消瘦納少便溏肺痿大症與培土生金冬朮薏仁炙草橘紅砂仁半夏扁豆白芍蛤殼闕歲平素鬱勃向衰之年厥陽司升耳鳴咳嗆上脘窒滯不舒近則寤不成寐診脈短澀虛數陰液內虧將交秋燥預進清金益胃迎其生生之氣來復恐延肺痿洋參茯神半夏曲蛤殼麥冬棗仁石決玫瑰花露李歲久嗽前曾咳臭屢經見紅漸至失音此起自熱在上焦恐延肺痿麥冬桑皮薏仁桔梗枇杷汁北沙參川貝茯苓地骨皮金歲損其肺者益其氣黨參茯苓甜杏桑皮薏仁上耆麥冬橘紅玉竹蛤殼嶽歲經言熱在上焦脈虛數者為肺痿汗易泄時惡風肺主皮毛故也唇口腐碎少納兼理陽明枇杷葉玉竹石膏糖炒扁豆茯苓麥冬川斛地骨皮白薇王咳嗆盜汗經云損其肺者益其氣玉竹麥冬柏仁川貝黨參地骨皮茯苓川斛虛損附失血衄血陸歲勞倦寒熱溫之以氣內經法也黨參桂枝鱉甲茯苓生薑首烏炙草丹皮陳皮大棗又前方有效桂枝青蒿鱉甲茯苓生薑炙草丹皮當歸陳皮大棗許歲勞倦乏力經曰形不足者溫之以氣黨參冬朮當歸桂枝砂仁黃耆炙草茯苓香附黃向有漏瘍去冬失血陰精漸耗無力眩暈行動數步便欲氣逆虛象顯著黨參麥冬牛膝川斛熟地五味茯神杜仲吳腎失封藏久矣陰虛則陽光上亢亢則害承乃制經義昭然屢經失血金水同治熟地天冬杜仲川石斛牡蠣麥冬湘蓮茯神王下虛上實乙癸同治熟地石決川斛女貞子萸肉沙苑茯神旱蓮草王陰虛滋養是矣然純陰之品未能克復出精之機宜兼益胃為穩生地麥冬川貝綿耆黨參扁豆川斛茯苓倪病久元神虧損微有寒熱時或火升不可苦寒傷胃試思正不旺而終不降耳擬方於術首烏歸身青蒿大棗茯神黨參陳皮生薑又盜汗怯冷寒熱未已營衛交虛此病後治法不同於初起感冒也於術茯神鱉甲首烏浮麥黃耆棗仁牡蠣廣皮王下部乏力耳鳴便艱經云精不足者補之以味熟地沙苑杜仲茯神龜版魚膠豬腰川斛朱積勞傷陽陰失其守以致去年驟然失血經曰陽絡傷則血外溢也然血既去陰必傷時值盛夏陰不配陽故身覺熱而不耐勞動勢所必然診脈頗有力非有餘也仲景謂之為減胃納甚少亦宜柔藥養之又曰胃為陽土得陰自安拙見備商生地川斛茯神地骨皮藕麥冬白芍扁豆料豆皮高勞倦乏力面無華色經曰形不足者溫之以氣歸耆建中湯加陳皮陳營血不充甘溫養之上耆甘草茯神木香冬朮當歸棗仁大棗周氣口脈大身微熱惡寒不知味治從勞倦門上耆陳皮升麻茯苓砂仁冬朮甘草柴胡當歸朱水虧火炎水火未得既濟之功脈弦數舌絳小便艱澀姑參造化之理黃河之水天上來人身則金能生水水生則肝有制胃有資矣丹溪隔一治法同一義也若以通利之劑當無是理天冬百合秋石麥冬燕窩竹葉又誅伐過多胃氣太傷不容穀食大便溏泄中宮乏砥柱之權舌絳無苔柔土少津液之布脈來數大非有餘也仲聖脈法為減耳擬金匱麥門冬湯益胃生津望其安穀人參麥冬茯神扁豆炙草粳米橘紅香稻葉建蘭葉徐歲大吐衄血併發經旨陽絡傷則血外溢也症勢至險姑涼胃泄沖法犀角地黃湯加牛膝茯苓麥冬澤瀉茅根童便陳歲左半脅背引痛頻吐紫血終瘀之象宜仲淳法山漆汁茜草牛膝藕節歸鬚生地鬱金茯苓料豆皮馮歲失血損陰本宜補養但偶兼外邪頭脹鼻塞姑與龍腦雞蘇意生地桑皮川貝薄荷地骨皮玉竹杏仁枇杷葉錢歲先天賦弱不充咽乾微熱症已久延仿錢仲陽法六味加麥冬元參另服六味丸宋歲脈弦數大陰損陽浮大便艱澀法宜滋養生地元參芝麻天冬茯神柏仁桑葉麥冬杜曾失血脘中痛絡瘀之象宗仲淳法降香汁楂炭延胡鬱金紅曲歸鬚王歲屢曾失血損陰髀肢痠楚麻軟下元不足有諸法宜填補合虎潛法熟地虎骨茯苓沙參杜仲牛膝黃柏杞子麥冬桑枝藕吳歲屢失血氣逆而短更有漏瘍宿疾填補無疑但胃納少寒熱無期治非易治熟地紫石英沉香汁青蒿藕節麥冬北沙參茯苓丹皮糯稻根鬚何歲右半腹蠕動飢則劇治從建中小建中湯加歸身杞子牡蠣茯神沉香徐歲酒客寒熱目黃溲赤嘔吐紫血脘痛絡瘀之象兼之濕熱症屬兩歧以意圖之川鬱金汁黑梔茵陳半夏曲澤瀉紫降香山楂赤苓橘紅紅曲馬歲自服皂莢子辛開太甚肺失其合且久恙元虛姑與益胃生金法麥冬扁豆干百合骨皮生蛤殼玉竹川貝款冬花桑枝朱歲先天不足耳失其聰生地杞子山藥遠志磁石石決茯苓菖蒲徐歲瀉沖治衄是景嶽法然納穀減少以和陽益胃生地川斛茯苓阿膠藕汁白芍牛膝陳皮扁豆尤歲調補真陰以充髓海熟地杞子鹿角霜杜仲山萸當歸鹿角膠川斛過歲茹素內熱心陽獨熾細地金斛麥冬料豆皮竹心山梔茯神生草張歲微寒熱頻作無時陽維為病歸身白芍細地甘草白薇丹皮桂木生薑大棗朱歲嗜酒傷肺屢失血咽痛痰黏作渴陰津不主上奉恐延損門炒生地知母麥冬人中白枇杷葉元參貝母霍斛雞子清吳歲久恙漸至形瘦肉削咳嗆損及中州坤厚日餒理屬難愈黨參茯苓扁豆砂仁桔梗白芍於術甘草山藥薏仁川貝香稻葉嶽歲胃不思谷損門最為可慮洋參麥冬沙參扁豆茯苓川石斛白芍橘紅香稻葉藕朱歲嘔見紫黑血脘中痛平素好飲熱酒丹溪云瘀留胃口有諸旋覆花湯加歸身川金山楂紅曲桃仁曹歲失血屢發發則盈碗此衝陽升逆過胃胃為都會之地故見端若此也但氣上少納胃食頗鈍中乏坐鎮之權恐交節反復甚易耳洋參上耆茯神白扁豆棋子青鉛麥冬熟地川斛地骨皮十大功勞陳交大節陰虛陽升血症復發每於戌亥為多龍相少藏血隨氣上也診脈芤弦填下攝納為主炒生地阿膠牛膝川斛茯苓龜版牡蠣青鉛扁豆藕節倪歲遠行勞倦兩經失血時或腰楚內傷之象六味加牛膝杜仲豬腰子朱歲損其肺者益其氣黨參茯苓麥冬川貝上耆橘紅蛤殼地骨皮白元米湯煎杜歲盜汗乏力補養固衛生耆牡蠣茯神冬朮浮麥柏仁地骨皮棗仁白芍吳歲熱久寢食如常起自下肢與壯水之主知柏八味煎服丁歲內傷不足寒熱無期盜汗頗多上耆首烏川斛牡蠣白芍茯苓棗仁煨薑胡歲陽絡傷則血外溢生地川斛茜草茯苓童便牡蠣白芍藕節扁豆丁歲漏瘍暗耗久矣封藏不固正涉地氣司升之候絡血沸騰咳嗆不已兼之滑泄或為盜汗脈芤細數皆是咎徵炒生地北參牡蠣茯神藕節龜版麥冬川斛茜草陸歲脈濡細陰虛及陽身熱消瘦汗出已多衛不固慮其損怯上耆茯神生地五味淮麥麥冬棗仁白芍柏仁南棗吳歲鼻衄不止宗仲景當從衝脈治大補陰丸加丹皮血餘川斛牛膝藕節孫大鼻衄兼行濁道為吐始於瀉沖法兼以鎮逆大補陰丸加牛膝牡蠣紫石英川斛扁豆側柏汁趙歲童真衄血賦卑不充炒生地山藥牛膝丹皮藕節料豆皮茯苓麥冬澤瀉另服六味丸四兩黃向有漏瘍去冬失血陰精漸耗無力眩暈行動數武便欲氣逆虛象顯著熟地麥冬茯神川斛黨參蓯蓉五味牛膝杜仲砂仁張血行清道為衄甚至精明穴向曾牙宣體質陰虧陽光易亢平補三陰六味加阿膠牡蠣陳皮側柏葉翁恙久陰陽偏勝正值經行水愈虧而陽越亢熱勢轉甚腰楚怯弱良有以也年逾五旬衝任不固八脈交損以致見象非一脈形虛芤帶數總以和陽育陰為要細生地女貞牡蠣茯神杜仲金石斛旱蓮白芍棗仁藕又前方頗覺安適然陰虛陽浮未見克服便為之損本胃納少振所謂精生於穀亦有生長之機俟一陰來復如何三才湯加茯神金斛牡蠣玫瑰露棗仁白芍女貞藕顧耳失其聰平補三陰六味丸加川斛磁石細石菖蒲汁顧熱不止起於湧泉下午入夜則劇經斷脘痛時嘔脈來虛數勞損見端草木難期速功香附鬱金熟地金斛茯苓丹皮陳皮砂仁十大功勞益母膏潘足腫枯瘦麻木不仁脊駝肋突經來復斷先天精血不充損症難愈熟地桂枝牛膝當歸杞子豬脊髓鱔血炒桑枝虎骨蔡歲難經云陽維為病苦寒熱此之謂也平素奇經不固兼之肝氣治宜兩顧當歸丹皮白薇沉香香附湘蓮鹿角霜白芍張歲失血後心痛徹背與育陰和陽生地參三七茜草川斛鬱金料豆皮茯苓麥冬華腰楚頗重議以補腎熟地杜仲當歸川斷沙苑川斛茯苓胡桃另服青娥丸二兩張歲臟躁欲哭咳嗆咽乾宗仲聖法炙草知母紅棗玉竹川貝茯神麥冬淮麥顧歲右一側眠氣虛之徵黨參炙草茯苓蛤殼麥冬五味橘紅川貝陳歲脈左搏大陰虛陽浮以致鼻衄走陽上下耗損勢非輕淺炒熟地牡蠣杜仲茯苓龜版膠萸肉川斛蓮鬚菟絲子畢失血損症滋養是矣胃少納穀頻欲嘔吐子病及母為難治經傷咳嗆骨蒸微熱盜汗脈數見象甚著黨參半夏曲茯苓青蒿左秦艽麥冬陳黃米金斛鱉甲炒烏梅劉歲虛體不耐勞行動則氣易逆時或夢遺火升素患血症理宜填納下體濕瘍議先平補六味丸加鹽水炒川柏杜仲黑殼蓮遺精謝陰精易泄少藏耳為之苦鳴熟地萸肉山藥杜仲天冬杞子牡蠣沙苑茯神菟絲鰁魚膠桑螵蛸吳病後不復精關不固熟地龍骨茯苓五味鰁魚膠川斛牡蠣菟絲沙苑湘蓮陳夢遺連發陽升又經失血幸中州無故壯水攝納子母兼顧大補陰煎加牡蠣北沙參川斛麥冬青鉛茯神錢封藏不固滑泄頻頻腎脈上循喉嚨嗆咳失音良有以也生地川貝上耆麥冬黨參扁豆茯神川斛程血去陰傷且兼夢遺虛陽易動宜介類潛之龜版熟地杜仲川斛金櫻子牡蠣山藥湘蓮芡實豬脊髓王真陰太虧之體涉四月陽升之時病之不愈固無足怪然濁轉加而精關不固最為變劇之端頗屬棘手姑擬人參固本丸為主望其轉機為荷人參固本加五味山藥川斛黑殼蓮子過便後帶積左半腹痛覺氣墜而欲大便知其清陽不升肝脾同病也明矣且兼夢遺胃不思納亦由氣分太泄所以精關不固腎中陽衰胃陽亦不振矣議與脾腎同治宗仲淳意於術炒枯砂糖穀芽湘蓮荷葉生菟絲白芍茯苓陳皮砂仁薛症經四載初因白濁繼而夢遺後復無夢而泄關鎖逮廢腎失封藏殊可慮也熟地龍骨益智杜仲桑螵蛸萸肉牡蠣川斛芡實金櫻子華淋濁夢遺為腎失封藏龍火易動宜壯水潛陽固攝熟地杜仲茯苓川斛菟絲子湘蓮牡蠣過肝腎陰虧封藏失職脈象微弦風陽易亢治從乙癸同源之治生地茯苓女貞黃菊川斛杜仲杞子湘蓮朱脾不能運腎失封臧相陽易動大便燥澀水固虧而滋膩難投脾惡濕也然理脾礙腎用藥頗難以意為主霞天膠炒於術茯神杜仲建蓮醋香附淮山藥柏仁川柏砂仁豬脊髓又前方頗安脹得寬而餘瀝未已肝主疏泄腎失封藏最難參合立方頗為不易霞天膠炒於術杜仲川斛黃柏煨木香茯神香附牡蠣湘蓮豬脊髓張肝脾之氣不和少腹攻觸作楚又經夢泄腎真不固尤為吃緊處矣大便稍干胃氣略開此為休徵脈濡小尺部微弦協和肝脾兼攝下焦人參於術茯神木香砂仁益智菟絲湘蓮白芍玫瑰露孫症經數載或差或劇中年腎真不固開合之機廢宗丹溪法大補陰煎加川斛茯苓杜仲秋石車前徐歲交節龍相少藏又經夢泄脈象濡弦填陰攝固奚疑大補陰煎加茯苓菟絲杜仲五味牡蠣湘蓮王歲夢遺損陰又曾失血下虛上實腰楚眩暈乙癸同源主治炒熟地石決明川斛女貞萸肉沙苑茯神旱蓮草陸歲下虛則眩腎失封藏六味加石決杜仲牡蠣湘蓮華腎失封藏熟地萸肉杜仲湘蓮芡實金櫻子龍骨牡蠣川斛砂仁另服威喜丸陳歲大鼻衄不止兼之滑泄此腎失封藏厥陽上冒最為重要大生地龜腹版牡蠣川斛芡實建蓮白芍茯苓料豆皮側柏葉陳歲封藏不固陰失其守陽曠其衛盜汗漸熱曾經痰血損怯漸著生地黨參茯神川斛玉竹地骨皮杜仲十大功勞葉華歲臍左動氣築築盜汗夢遺皆肝腎下虛使然熟地牡蠣沙苑杜仲川斛湘蓮紫石英柏子仁茯神砂仁曹歲夢遺久而滑泄腰楚腎失封藏理宜固攝兼之肝胃積飲發則口甜脘悶佐以交感丹熟地牡蠣茯神菟絲香附陳皮杜仲湘蓮砂仁朱歲復因嗔怒動肝相火寄旺翕然妄動精泄莫制經旨乙癸同源潛陽固攝大補陰煎加牡蠣茯神菟絲砂仁淮藥五味建蓮徐歲症因驚恐而作驚則傷心恐則傷腎心腎失交故多夢悸動精關淋瀝脈虛弦澀治宜攝固枯熟地萸肉山藥茯苓五味菟絲牡蠣建蓮杜仲另服孔聖枕中丹陳歲固攝精關復方之制丸方生地杜仲牡蠣淮藥茯苓菟絲龍齒萸肉沙苑五味子桑螵蛸豬脊髓建蓮龜版魚膠淋濁陸歲淋濁妨溺通補兼施大補陰合導赤散加茯苓菟絲王歲內熱腰楚血淋六味加龜版牡蠣杜仲側柏葉葉歲濁後溲頻餘瀝莖中痛症延已久議壯水攝固六味加杜仲龜版川斛秋石錢去冬滯下濕熱不清逗留二腑早間大便黏膩小溲不爽勢欲淋濁由操勞失分清濁分理開中為先萆薢生於術陳皮枳殼海金砂益智茯苓澤瀉車前徐淋濁莖中痛上為目疾肝腎虛火上升先以導赤法使其下降導赤散加丹皮茯苓川斛青鹽料豆皮萬歲溲色白而痛議以濕熱治例川楝子茯苓木通丹皮陳皮川柏萆薢細生地黑山梔王歲濁結而精竅覺動亦屬腎氣下泄仍宜固攝方其溲便不清兼調溺竅通補兼施為是熟地龜版沙苑魚膠蓮鬚川斛木通草梢青鹽丁歲精未滿而濁下不止經旨腎司收藏又中氣不足之謂歟始擬平補三陰遵薛氏法六味加於術建蓮另服威喜丸四兩徐歲經云腎者主水受五臟六腑之精而藏之今則封藏失職水漸虧而火漸亢斯百病生矣診脈頗弦長沙脈法為之減也甚至遺滑無度將有淋濁之慮最難圖治拙見以壯水為主俾得水火無偏勝之憂斯陰平陽祕始克有濟耳靜養維持尤宜加意於藥石之先熟地龜版萸肉山藥杜仲石蓮龍骨牡蠣川斛金歲相陽內亢溲赤莖中痛已及年餘議宗丹溪法大補陰合導赤加茯苓秋石魯歲白濁三月不止而溲不痛宜平補固攝六味加牡蠣川斛杜仲白螺螄殼威喜丸楊血淋延久真陰大傷溲數而餘瀝作痛以瀉南補北壯水制火大補陰丸加茯苓甘草秋石澤瀉料豆皮嶽歲淋濁作楚通攝並濟鮮生地木通知母川柏杜仲茯苓草梢菟絲陳皮秋石華歲腰楚血淋溲痛通補兼施大補陰煎加木通草梢琥珀杜仲料豆皮王歲勞倦傷腎血淋未已風陽上旋頭暈牽掣痛楚宜乙癸同治生地炭木通草梢女貞黃菊石決明阿膠川斛白毛夏枯草絲瓜絡雪羹湯代水過歲勞力傷腎濕氣下注為濁炒生地知母黃柏草梢杜仲木通竹葉茯苓萆薢虞歲陰虛龍相少藏淋濁淹延不止大補陰煎加萸肉淮藥茯苓菟絲湘蓮秋石謝歲淋為衝任內傷痛在少腹二便均不通爽固澀未穩烏賊骨丹參阿膠龜版川柏酒炒茜草黃芩杜仲車前秋石又淋久漸欲閉癃氣下墜朝輕暮重得暖稍適者陰中之陽不振故徒恃滋填無益也補中益氣加東垣滋腎丸又前方益氣升陽閉癃氣墜均減少腹痠楚究是衝任內傷仍前法加減補中益氣加杞子青鹽炒豬脊髓薛先曾血淋繼則溲濁腎陰固虧脾元亦弱故食後不運而瘡痍此可徵也正值濕土司令入夜微熱盜汗脈虛最易延入損門仿立齋先生治意六味去萸肉加於術川斛益智萆薢另服威喜丸胡歲水虧龍相少藏敗精陰竅固有諸矣然屢投辛香走竅關閘漸馳溺仍不利開合之機失職法宜通攝兼施斯為王道大補陰煎加木通草梢遠志琥珀秋石料豆皮另服東垣滋腎丸徐歲脈弦為減長沙之旨也火升口乾陰精少奉總由淋瀝暗耗故未能驟期速動三才湯加鰁膏川斛龜版白螵螄殼沙苑杜仲川柏另服威喜丸鄒歲淋濁如膏兩月不愈溲後仍痛此內傷勞倦濕熱不清黨參白朮茯苓萆薢澤瀉車前麥冬草梢黃柏秋石周歲右髀股筋攣作痛幾及三月漸延白濁溲便不利此肝腎內傷濕熱下注脈形虛數口乾怯弱殊非輕淺萆薢黃柏木瓜虎骨木通車前知母牛膝陳皮桑枝徐歲溲赤混濁恐延血淋導赤散加萆薢丹皮川柏酒炒料豆皮胡歲溲濁如疳老年氣液下脫膏淋重症不可輕視六味丸加上耆菟絲川斛威喜丸奚歲滋養臟陰通泄火腑大生地龜版心知母川柏秋石茯苓豬脊髓車前子曹歲高年血淋氣墜大便常溏泄仿補中益氣法上耆冬朮茯苓炙草醋升麻醋柴胡白芍地榆陳皮藕馬歲淋濁腫痛濕火下流大生地龍膽車前澤瀉知母川柏茯苓萆薢草梢金素患淋濁腎陰虧乏久矣濕邪下注海底結癰之象舌苔滑膩脈形弦數見象一斑經云陰虛者陽必湊之至陰之地龍相所居瀉南補北莫如丹溪探本之道也生地砂仁炒敗龜版黃柏知母赤苓澤瀉陳皮丹皮苡仁血珀海金砂任歲淋濁如泔月餘不止靈樞云中氣不足溲便為之變也四君子加川斛牡蠣菟絲益智澤瀉湘蓮華歲血淋結塊色紫艱澀難忍與李瀕湖治柳橋之症頗似姑仿其意原方用虎杖散今人不識此草以杜牛膝代之琥珀歸尾赤芍瞿麥韭根鬚料豆丹參木通車前杜牛膝根細打煎好另入麝香少許計白濁溲痛大補陰煎加木通車前生草梢淡秋石黃白濁溲痛先通火腑導赤散加知母茯苓川柏秋石車前朱歲小便頻數不楚法宜固攝熟地萸肉川柏龜版杜仲淮藥川斛蛤殼桑螵蛸諸歲痛淋赤塊先曾腹滿氣血鬱痹議以通腑導赤散加血琥茯苓料豆皮車前徐歲血淋腰楚宜通火腑補水臟所謂瀉南補北也大補陰煎加草梢茯苓木通錢小便帶紅兼清營分導赤散加萆薢茯苓於術通草丹皮澤瀉木香砂仁又丸方六味丸加於術洋參木香萆薢車前川柏蜜丸華歲掌心為勞宮心之滎穴煩熱已久小溲不清仿火府丹火府丹加麥冬黑梔茯神蓮子痿馮歲痿躄軟麻脘悶氣壅大便不爽脈象中陽不運仿胸痹法亦獨取陽明之義也瓜蔞仁薤白頭桂枝枳殼上沉香牛膝當歸陳皮桑枝陸歲足惡寒痠麻無力大便燥結口乾仿虎潛法熟地虎骨川柏酒炒牛膝鎖陽當歸戟肉桂枝淮藥顧歲驚蟄節候地氣司升素體水不涵木木能生火化風神魂由是少安筋骨為之不利痛兼腰脊髀股者其咎可知自述得寐則適經言不臥則血歸於肝水能生木之謂也乙癸同源交合坎離阿膠生地雞子黃朱茯神棗仁遠志川斛川斷沙苑廣皮白桑枝鴨血拌陳痿躄不堅經言獨取陽明而脾虛濕勝之體瘡痍愈以意為主四君子加虎骨萆薢桑枝黃柏苡米木瓜朱歲口苦舌黃黑脈濡數嗜酒中虛濕勝化熱漸延痿躄非輕象也生洋參金石斛麥冬花粉茯苓澤瀉苡仁陳皮麋草又前方頗適仍宗經法生洋參麥冬澤瀉萆薢麋草茅根酒淡芩白朮錢歲填補通痹上部小效仍寒熱而熱減不舒考古法有治痿獨取陽明之論以陽明主束筋骨而利機關也兼以丸藥緩調茯苓益智上耆巴戟砂仁川斛木瓜桂枝萆薢威喜丸虎潛丸腸痹張前議溫潤寬暢仍未大便似有欲便不得之勢且云肢麻畏寒明是陽氣衰弱失司旋轉其脅痛且喜溫暖則適尤屬可徵六腑為陽以通為用胃宜降和自然之理也症因頻經嘔吐胃氣逆行失血之後幽門廣腸則燥愈燥則愈結最難取效者緩以圖之如濟川並五仁通幽皆王道治法未敢險峻耳蓯蓉當歸牛膝炭柏子仁麻仁松仁枳殼蘇子新會白三劑後大便下沈納穀稍可大便燥堅液枯欲結之象白蜜半夏當歸柏子仁牛膝枳殼橘紅蘇子鬱金竹瀝薑汁周歲勞動傷陰肛門火燥大便不爽議與清滋大補陰丸加麥冬槐米周歲二便不爽經云九竅不和腸胃之所生也麻仁桑葉杏仁芝麻蔞仁木通枳殼車前川朴顧脈仍革右為甚腸痹症也鮮生地歸鬚牛膝麻仁杏仁沉香汁川朴柏子仁裴操持過度心腎不交飢不能食大便艱澀皆津液內虧陽明失司出納圖治非易蓯蓉干制洋參茯神牛膝棗仁烏芝麻柏仁麥冬又六日不更衣胃腑失司下行脈象短澀液虧之象法宜溫潤蓯蓉牛膝火麻仁郁李仁烏芝麻當歸麥冬柏子仁茯神仍服天王補心丹參湯送下又得大便不爽形氣衰弱尺脈尤虛殊為可慮擬方商正大蓯蓉人參茯神牛膝柏子仁沉香汁紫石英麥冬五味坎氣天王補心丹又丸方人參生地當歸元參天冬丹參棗仁茯神麥冬遠志柏子仁蜜丸硃砂為衣淮麥南棗湯下劉歲木乘胃土䐜脹大便不爽恐延腸痹蔞皮桑葉烏芝麻枳殼腹皮青皮陳皮白芍半夏沉香烏藥汁馮歲氣滯脘痞大便不爽腸痹例治香附鬱金枳殼紫菀沉香汁神麯瓜蔞杏仁胡痢後腸痹咳嗽不大便杏仁枳殼橘紅腹皮蔞皮桔梗麥芽桑皮朱歲二便艱澀氣墜不爽症已久延經言腎開竅於二陰治從此義大蓯蓉枳殼淡秋石茯苓陳皮炒柏仁當歸車前子朱歲木鬱水虧氣墜澀痛溲不利而大便燥症延四載不易圖治生地丹皮當歸膽草木通柴胡山梔白芍車前錢服潤燥寬暢得大便而少腹之脹滿不減痰多納少脘痞脈短色奪消瘦與胃實腑病有間矣仿濟川煎合腸痹例胖蓯蓉牛膝桑葉柏仁麥芽當歸枳殼芝麻杏仁余腎司二便出納之權廢弛大便燥堅小溲不禁高年治在命門炒熟地當歸五味蓯蓉杞子補骨脂柏仁黑芝麻癃閉王歲膀胱不利為癃已經一載據述勞動則劇總由天乙虧損以致機關不利腎司二便也與東垣滋腎法知母肉果黃柏菖蒲韭根鬚又據述晨起稍通得暖稍適膀胱之氣不化仍用東垣法知母黃柏肉桂吳歲溲不利莖中痛導赤散加知母黃柏車前滑石瞿麥華延症一月脈象小數非實火也宗經旨瀉南補北大補陰合導赤散加茯苓菖蒲萆薢秋石張經云膀胱不利為癃氣化則能出矣少腹滿溲色赤濕熱蘊結奚疑苔膩作渴脈形小數正氣漸虧恐多變幻不可輕視西珀滑石赤苓澤瀉車前竹葉豬苓木通生草黑梔通草煎湯代水周歲膀胱不利為癃瞿麥木通金鈴生地菖蒲汁車前金沙茯苓澤瀉草梢一劑稍通所下溺色白膩照原方加飛滑石去生地俞歲濕體氣化不及州都小便欲出未能腹中漉漉恐延膨滿理勢非也但兼牙宣行動乏力腎關出納廢弛參東垣法東垣滋腎丸二兩陳歲癃閉稍通未能暢達且有肝氣最宜疏泄苦辛是議金鈴子木通沉香汁枳殼車前兩頭尖吳萸歸鬚柏仁麻仁韭根鬚另服滋腎丸又泄肝通腑僅獲小效內經云膀胱不利為癃素性嗜酒聚濕生熱且驟起屬熱大便亦閉今溲下赤澀微痛此痛乃瘀濁欲泄奚疑木通細生地草梢金鈴子滑石瞿麥車前川連吳萸炒許歲驟然癃閉二腑皆痹起自腹痛支滿肝失疏泄苦辛是議吳萸歸鬚郁李仁山梔麻仁木通金鈴枳殼車前六一散韭根鬚兩頭尖
